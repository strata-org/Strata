name = "StrataPython"
version = "0.1.0"
defaultTargets = ["StrataPython"]
testDriver = "StrataTestMain"

[[require]]
name = "Strata"
path = ".."

[[lean_lib]]
name = "StrataPython"

[[lean_lib]]
name = "StrataPythonTest"
globs = ["StrataPythonTest.+"]

[[lean_lib]]
name = "StrataPythonTestExtra"
globs = ["StrataPythonTestExtra.+"]

[[lean_exe]]
name = "StrataTestMain"
needs = ["StrataPython", "StrataPythonTest"]

[[lean_exe]]
name = "DiffTestCore"

[[lean_exe]]
name = "PyAnalyzeLaurelToGoto"
