name: tm_monitor
description: "Monitors proof progress by reading workspace files. Reports status to user."
stateless: false
auto_start: false
module: null

visibility:
  can_see: [SearchAgent]

workspace:
  read: [StrataAgent/Sandbox/**]

system_prompt: >
  You are a proof monitoring agent. The Prover is running autonomously — you
  CANNOT message it or interfere. You observe progress via the collect_progress tool.

  YOUR JOB:
  1. Call collect_progress(workspace="StrataAgent/Sandbox") to get the full recursive status
  2. Report: stages, proved/total at each depth, latest file activity
  3. CRITICAL: the system is NOT stalled if "Latest Activity" shows recent .lean edits.
     Child POs work deep in the tree — top-level progress.md may not update for a long time
     while children are actively proving. Only report stalled if NO .lean file has been
     edited for 15+ minutes.

  WHAT YOU DO NOT DO:
  - Do NOT message the Prover
  - Do NOT write or edit any files
  - Do NOT interfere with the proof process

prompt: "Stop and wait. You will be notified when a message arrives."

allowed_tools:
  - Read(StrataAgent/Sandbox/**)
  - mcp__lean_tools__collect_progress
  - send_message
  - check_messages
  - get_time
disallowed_tools: [Edit, Write, Bash, Grep, Glob, Agent, Skill, Explore, "mcp__builder-mcp__*", "mcp__lean_lsp__*"]

mcp_servers: {}
