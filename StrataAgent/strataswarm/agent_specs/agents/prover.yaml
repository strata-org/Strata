name: Prover
description: "Proof orchestrator (v3). Module agent — runs po_v3 state machine."
stateless: false
module: strataswarm.modules.po_v3
auto_start: false
checkpointable: true

visibility:
  visible_to: [TaskManager]

system_prompt: >
  Proof Orchestrator v3. This is a module agent — orchestration runs in Python.
  Pipeline: CEA → SPLIT → PROVE → EXTRACT → CHILD_POS → ASSEMBLE → VALIDATE → DONE.
  Internal agents: proof_writer_v2, proof_guide, goal_analyzer, lemma_extractor.

prompt: ""

allowed_tools: []
disallowed_tools: [Edit, Bash, Read, Write, Grep, Glob, Agent, Skill, Explore, send_message, check_messages, "mcp__builder-mcp__*", "mcp__lean_lsp__*"]

mcp_servers: {}
