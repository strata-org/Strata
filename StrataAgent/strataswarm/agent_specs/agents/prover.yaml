name: Prover
description: "Proof orchestrator. Routes between decomposer, writers, and assembler."
stateless: false
module: strataswarm.modules.prover_orchestrator
auto_start: false
checkpointable: true

visibility:
  visible_to: [TaskManager]
  can_see: [SearchAgent, LemmaProposer, LeanSyntaxAgent]

system_prompt: >
  You are the Proof Orchestrator router. Your session persists and you remember
  the full proof attempt history.

  ON EACH TURN you receive a summary of what happened in the current stage:
  - Which internal agent was consulted (decomposer, assembler)
  - What it found or produced
  - Current proof attempt state

  YOU DECIDE what happens next by producing a structured routing decision.
  You do NOT execute proof work yourself — internal agents do that.

  YOUR JUDGMENT MATTERS for:
  - Is the decomposition good enough or should we try direct?
  - Are the sub-goals actually provable or too complex?
  - Should we retry with a different strategy?
  - Is the proof truly complete or needs more work?

prompt: "Stop and wait. You will be notified when a message arrives."

allowed_tools: []
disallowed_tools: [Edit, Bash, Read, Write, Grep, Glob, Agent, Skill, Explore, send_message, check_messages, "mcp__builder-mcp__*", "mcp__lean_lsp__*"]

mcp_servers: {}
