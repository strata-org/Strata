<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StrataSwarm Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
header { background: #16213e; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #0f3460; }
header h1 { font-size: 18px; color: #4fc3f7; }
#total-cost { font-size: 14px; color: #81c784; }
.container { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 260px; background: #16213e; border-right: 1px solid #0f3460; overflow-y: auto; }
.agent-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #0f3460; transition: background 0.2s; }
.agent-item:hover, .agent-item.active { background: #1a1a2e; }
.agent-item .name { font-weight: 600; font-size: 14px; }
.agent-item .meta { font-size: 11px; color: #888; margin-top: 4px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge-pending { background: #424242; color: #bbb; }
.badge-running { background: #1b5e20; color: #a5d6a7; }
.badge-paused { background: #e65100; color: #ffcc02; }
.badge-completed { background: #004d40; color: #80cbc4; }
.badge-cancelled { background: #b71c1c; color: #ef9a9a; }
.badge-failed { background: #b71c1c; color: #ef9a9a; }
.badge-halted { background: #4a148c; color: #ce93d8; }
.main { flex: 1; display: flex; flex-direction: column; }
.messages { flex: 1; overflow-y: auto; padding: 16px; }
.msg { margin-bottom: 8px; padding: 8px 12px; background: #1e2a3a; border-radius: 6px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.msg.injected { background: #2e1a3a; border-left: 3px solid #ce93d8; }
.msg.tool { background: #1a2e2a; border-left: 3px solid #80cbc4; font-family: monospace; font-size: 12px; }
.controls { display: flex; gap: 8px; padding: 12px 16px; background: #16213e; border-top: 1px solid #0f3460; }
.controls button { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
.btn-pause { background: #e65100; color: white; }
.btn-resume { background: #1b5e20; color: white; }
.btn-cancel { background: #b71c1c; color: white; }
.controls input { flex: 1; padding: 8px 12px; border: 1px solid #0f3460; border-radius: 4px; background: #1a1a2e; color: #e0e0e0; font-size: 13px; }
.controls input::placeholder { color: #666; }
.btn-send { background: #4fc3f7; color: #1a1a2e; }
.session-id { font-size: 11px; color: #666; padding: 4px 16px; font-family: monospace; }
.empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #555; font-size: 14px; }
</style>
</head>
<body>
<header>
  <h1>StrataSwarm</h1>
  <span id="total-cost">$0.0000</span>
</header>
<div class="container">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="session-id" id="session-id"></div>
    <div class="messages" id="messages"><div class="empty">Select an agent to view messages</div></div>
    <div class="controls">
      <button class="btn-pause" onclick="pauseAgent()">Pause</button>
      <button class="btn-resume" onclick="resumeAgent()">Resume</button>
      <button class="btn-cancel" onclick="cancelAgent()">Cancel</button>
      <input type="text" id="msg-input" placeholder="Send feedback to agent..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button class="btn-send" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>
<script>
let ws;
let selectedAgent = null;
let agents = {};
let agentMessages = {};
let totalCost = 0;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.agents) {
      Object.entries(data.agents).forEach(([name, info]) => {
        agents[name] = info;
        if (!agentMessages[name]) agentMessages[name] = [];
      });
      renderSidebar();
    } else if (data.type === 'agent_event') {
      handleEvent(data);
    }
  };
  ws.onclose = () => setTimeout(connect, 2000);
}

function handleEvent(ev) {
  const name = ev.agent;
  if (!agentMessages[name]) agentMessages[name] = [];
  if (ev.event_type === 'message') {
    agentMessages[name].push({ text: ev.data, type: ev.data && ev.data.startsWith('[tool]') ? 'tool' : (ev.data && ev.data.startsWith('[Injected') ? 'injected' : 'normal') });
  } else if (ev.event_type === 'status_change') {
    if (!agents[name]) agents[name] = { name, status: ev.data };
    else agents[name].status = ev.data;
  } else if (ev.event_type === 'cost_update' && ev.data) {
    if (!agents[name]) agents[name] = { name };
    agents[name].cost_usd = parseFloat(ev.data);
    totalCost = Object.values(agents).reduce((s, a) => s + (a.cost_usd || 0), 0);
    document.getElementById('total-cost').textContent = `$${totalCost.toFixed(4)}`;
  } else if (ev.event_type === 'result') {
    agentMessages[name].push({ text: `[Result] ${ev.data}`, type: 'normal' });
  }
  renderSidebar();
  if (name === selectedAgent) renderMessages();
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = Object.values(agents).map(a => `
    <div class="agent-item ${a.name === selectedAgent ? 'active' : ''}" onclick="selectAgent('${a.name}')">
      <div class="name">${a.name} <span class="badge badge-${a.status || 'pending'}">${a.status || 'pending'}</span></div>
      <div class="meta">${a.cost_usd ? '$' + a.cost_usd.toFixed(4) : ''} ${a.num_turns ? a.num_turns + ' turns' : ''}</div>
    </div>
  `).join('');
}

function selectAgent(name) {
  selectedAgent = name;
  renderSidebar();
  renderMessages();
  const a = agents[name];
  document.getElementById('session-id').textContent = a && a.session_id ? `session: ${a.session_id}` : '';
}

function renderMessages() {
  const el = document.getElementById('messages');
  const msgs = agentMessages[selectedAgent] || [];
  if (!msgs.length) { el.innerHTML = '<div class="empty">No messages yet</div>'; return; }
  el.innerHTML = msgs.map(m => `<div class="msg ${m.type}">${escapeHtml(m.text)}</div>`).join('');
  el.scrollTop = el.scrollHeight;
}

function escapeHtml(t) {
  if (!t) return '';
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function pauseAgent() { if (selectedAgent && ws) ws.send(JSON.stringify({ action: 'pause', agent: selectedAgent })); }
function resumeAgent() { if (selectedAgent && ws) ws.send(JSON.stringify({ action: 'resume', agent: selectedAgent })); }
function cancelAgent() { if (selectedAgent && ws) ws.send(JSON.stringify({ action: 'cancel', agent: selectedAgent })); }
function sendMessage() {
  const input = document.getElementById('msg-input');
  if (!selectedAgent || !input.value.trim()) return;
  ws.send(JSON.stringify({ action: 'send_message', agent: selectedAgent, message: input.value }));
  input.value = '';
}

connect();
</script>
</body>
</html>
