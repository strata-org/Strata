<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StrataSwarm v3 Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
header { background: #16213e; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #0f3460; }
header h1 { font-size: 18px; color: #4fc3f7; }
.header-controls { display: flex; gap: 8px; align-items: center; }
.header-controls button { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
#total-cost { font-size: 13px; color: #81c784; margin-right: 12px; }
.btn-create { background: #7c4dff; color: white; }
.btn-start { background: #00c853; color: white; }
.btn-pause-all { background: #e65100; color: white; }
.btn-resume-all { background: #1b5e20; color: white; }
.btn-cancel-all { background: #b71c1c; color: white; }
.btn-start:disabled, .btn-create:disabled { opacity: 0.5; cursor: not-allowed; }
.container { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 280px; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; }
.sidebar-header { padding: 10px 14px; font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; border-bottom: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
.sidebar-header button { padding: 3px 8px; border: none; border-radius: 3px; cursor: pointer; font-size: 11px; background: #4fc3f7; color: #1a1a2e; font-weight: 600; }
.agent-list { flex: 1; overflow-y: auto; }
.agent-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #0f3460; transition: background 0.2s; }
.agent-item:hover, .agent-item.active { background: #1a1a2e; }
.agent-item .name { font-weight: 600; font-size: 13px; }
.agent-item .meta { font-size: 11px; color: #888; margin-top: 3px; }
.agent-item .spec-info { font-size: 10px; color: #666; margin-top: 2px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; margin-left: 6px; }
.badge-pending { background: #424242; color: #bbb; }
.badge-running { background: #1b5e20; color: #a5d6a7; }
.badge-paused { background: #e65100; color: #ffcc02; }
.badge-completed { background: #004d40; color: #80cbc4; }
.badge-cancelled, .badge-failed { background: #b71c1c; color: #ef9a9a; }
.badge-halted { background: #4a148c; color: #ce93d8; }
.badge-draft { background: #37474f; color: #90a4ae; }
.main { flex: 1; display: flex; flex-direction: column; }
.view-tabs { display: flex; background: #16213e; border-bottom: 1px solid #0f3460; }
.view-tab { padding: 8px 16px; cursor: pointer; font-size: 12px; font-weight: 600; color: #888; border-bottom: 2px solid transparent; }
.view-tab.active { color: #4fc3f7; border-bottom-color: #4fc3f7; }
.messages { flex: 1; overflow-y: auto; padding: 12px 16px; }
.msg { margin-bottom: 6px; padding: 6px 10px; background: #1e2a3a; border-radius: 5px; font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.msg .msg-agent { font-weight: 700; font-size: 11px; margin-bottom: 2px; }
.msg.tool { background: #1a2e2a; border-left: 3px solid #80cbc4; font-family: monospace; font-size: 11px; }
.msg.tool_result { background: #1a2a2e; border-left: 3px solid #4fc3f7; font-family: monospace; font-size: 11px; }
.msg.query { background: #2e2a1a; border-left: 3px solid #ffa726; font-family: monospace; font-size: 11px; white-space: pre-wrap; }
.msg.injected { background: #2e1a3a; border-left: 3px solid #ce93d8; }
.msg.notification { background: #2a2a1a; border-left: 3px solid #ffcc02; font-size: 11px; }
.msg.status { background: transparent; color: #666; font-size: 11px; padding: 2px 10px; }
.controls { display: flex; gap: 8px; padding: 10px 14px; background: #16213e; border-top: 1px solid #0f3460; align-items: center; }
.controls button { padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; }
.btn-pause { background: #e65100; color: white; }
.btn-resume { background: #1b5e20; color: white; }
.btn-cancel { background: #b71c1c; color: white; }
.controls input { flex: 1; padding: 7px 10px; border: 1px solid #0f3460; border-radius: 4px; background: #1a1a2e; color: #e0e0e0; font-size: 12px; }
.controls input::placeholder { color: #555; }
.btn-send { background: #4fc3f7; color: #1a1a2e; }
.empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #555; font-size: 13px; }
/* Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.visible { display: flex; }
.modal { background: #16213e; border-radius: 8px; padding: 20px; width: 500px; max-height: 80vh; overflow-y: auto; border: 1px solid #0f3460; }
.modal h2 { font-size: 16px; color: #4fc3f7; margin-bottom: 14px; }
.modal label { display: block; font-size: 12px; color: #aaa; margin-top: 10px; margin-bottom: 4px; }
.modal input, .modal textarea { width: 100%; padding: 8px 10px; border: 1px solid #0f3460; border-radius: 4px; background: #1a1a2e; color: #e0e0e0; font-size: 12px; font-family: inherit; }
.modal textarea { min-height: 60px; resize: vertical; }
.modal .row { display: flex; gap: 10px; }
.modal .row > div { flex: 1; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.modal-actions button { padding: 7px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
.btn-modal-add { background: #4fc3f7; color: #1a1a2e; }
.btn-modal-cancel { background: #424242; color: #ccc; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.btn-save { background: #0288d1; color: white; }
.btn-load { background: #6a1b9a; color: white; }
.saved-list { margin-top: 10px; }
.saved-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: #1a1a2e; border-radius: 4px; margin-bottom: 6px; font-size: 12px; }
.saved-item button { padding: 3px 8px; border: none; border-radius: 3px; cursor: pointer; font-size: 11px; font-weight: 600; margin-left: 6px; }
.saved-item .btn-load-item { background: #6a1b9a; color: white; }
.saved-item .btn-delete-item { background: #b71c1c; color: #ef9a9a; }
</style>
</head>
<body>
<header>
  <h1>StrataSwarm v2</h1>
  <div class="header-controls">
    <span id="total-cost">$0.0000</span>
    <button class="btn-save" onclick="showSaveModal()">Save</button>
    <button class="btn-load" onclick="showLoadModal()">Load</button>
    <button style="background:#2e7d32;color:#c8e6c9;padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;" onclick="createCheckpoint()">Checkpoint</button>
    <button style="background:#37474f;color:#90a4ae;padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;" onclick="listCheckpoints()">Resume</button>
    <button class="btn-create" onclick="createNew()" title="Clear all agents and start fresh">New</button>
    <button class="btn-cancel" onclick="unloadSwarm()" title="Unload current agents (keeps saved configs)">Unload</button>
    <button class="btn-start" id="btn-start" onclick="startSwarm()">Start</button>
    <button class="btn-pause-all" onclick="pauseAll()">Pause All</button>
    <button class="btn-resume-all" onclick="resumeAll()">Resume All</button>
    <button class="btn-cancel-all" onclick="cancelAll()">Cancel All</button>
    <button style="background:#e040fb;color:white;padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;margin-left:12px;" onclick="showReplayModal()">Replay</button>
    <button style="background:#4fc3f7;color:#1a1a2e;padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;margin-left:4px;" onclick="window.open('/slides','_blank')">Slides</button>
  </div>
</header>
<div class="container">
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Agents</span>
      <button onclick="showAddAgent()">+ Add Agent</button>
    </div>
    <div class="agent-list" id="agent-list"></div>
  </div>
  <div class="main">
    <div class="view-tabs">
      <div class="view-tab active" onclick="switchView('agent')" id="tab-agent">Agent View</div>
      <div class="view-tab" onclick="switchView('chitchat')" id="tab-chitchat">All Messages</div>
      <div class="view-tab" onclick="switchView('spec')" id="tab-spec">Agent Spec</div>
      <div class="view-tab" onclick="switchView('history')" id="tab-history">Checkpoints</div>
      <div class="view-tab" onclick="switchView('telemetry')" id="tab-telemetry">Telemetry</div>
      <div class="view-tab" onclick="switchView('nudges')" id="tab-nudges">Nudges</div>
      <div class="view-tab" onclick="switchView('statemachine')" id="tab-statemachine">State Machine</div>
      <div class="view-tab" onclick="switchView('lemmadag')" id="tab-lemmadag">Lemma DAG</div>
    </div>
    <div class="messages" id="messages"><div class="empty">Add agents and start the swarm</div></div>
    <div class="controls">
      <button class="btn-pause" onclick="pauseAgent()">Pause</button>
      <button class="btn-resume" onclick="resumeAgent()">Resume</button>
      <button style="background:#ff6f00;color:white;padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;" onclick="interruptAgent()">Interrupt</button>
      <button class="btn-cancel" onclick="cancelAgent()">Cancel</button>
      <select id="msg-target" style="padding:6px 8px;border:1px solid #0f3460;border-radius:4px;background:#1a1a2e;color:#e0e0e0;font-size:12px;min-width:120px;">
        <option value="">-- select target --</option>
      </select>
      <input type="text" id="msg-input" placeholder="Type message..." onkeydown="if(event.key==='Enter')sendMessage()" style="flex:1;">
      <button class="btn-send" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<!-- Add Agent Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)hideModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Add Agent</h2>
    <label>Name</label>
    <input type="text" id="agent-name" placeholder="e.g. researcher">
    <label>System Prompt (role + collaborators)</label>
    <textarea id="agent-system-prompt" placeholder="You are the Researcher. You work with: writer (summarizes findings)."></textarea>
    <label>Task Prompt</label>
    <textarea id="agent-prompt" placeholder="Find the highest revenue month in metrics.csv and send it to writer."></textarea>
    <label>Allowed Tools (comma-separated)</label>
    <input type="text" id="agent-allowed-tools" placeholder="Bash, Read, Grep">
    <label>Disallowed Tools (comma-separated, optional)</label>
    <input type="text" id="agent-disallowed-tools" placeholder="Edit, Write">
    <div class="row">
      <div><label>Max Turns</label><input type="number" id="agent-max-turns" placeholder="10"></div>
      <div><label>Max Budget ($)</label><input type="number" id="agent-max-budget" step="0.01" placeholder="0.50"></div>
      <div><label>Timeout (s)</label><input type="number" id="agent-timeout" placeholder="120"></div>
    </div>
    <label style="margin-top:12px;display:flex;align-items:center;gap:8px;cursor:pointer;">
      <input type="checkbox" id="agent-is-super" style="width:auto;">
      <span>SuperAgent (can spawn sub-agents)</span>
    </label>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="hideModal()">Cancel</button>
      <button class="btn-modal-add" onclick="addAgent()">Add Agent</button>
    </div>
  </div>
</div>

<!-- Save Swarm Modal -->
<div class="modal-overlay" id="save-modal" onclick="if(event.target===this)hideSaveModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Save Swarm</h2>
    <label>Swarm Name</label>
    <input type="text" id="save-swarm-name" placeholder="e.g. security-test" onkeydown="if(event.key==='Enter')saveSwarm()">
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="hideSaveModal()">Cancel</button>
      <button class="btn-modal-add" onclick="saveSwarm()">Save</button>
    </div>
  </div>
</div>

<!-- Load Swarm Modal -->
<div class="modal-overlay" id="load-modal" onclick="if(event.target===this)hideLoadModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Load Swarm</h2>
    <div class="saved-list" id="saved-list-container"></div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="hideLoadModal()">Close</button>
    </div>
  </div>
</div>

<!-- Replay Modal -->
<div class="modal-overlay" id="replay-modal" onclick="if(event.target===this)hideReplayModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 style="color:#e040fb;">Session Replay</h2>
    <div id="replay-session-list" style="margin-bottom:12px;"></div>
    <label>Session Path (or pick from above)</label>
    <input type="text" id="replay-session-path" placeholder="temp/sessions/2026-06-23_04-21-52/LeanSwarm">
    <label>Speed</label>
    <div style="display:flex;align-items:center;gap:10px;">
      <input type="range" id="replay-speed-slider" min="0" max="50" step="0.5" value="5" style="flex:1;" oninput="document.getElementById('replay-speed-val').textContent=this.value+'x'">
      <span id="replay-speed-val" style="font-size:12px;color:#4fc3f7;min-width:40px;">5x</span>
    </div>
    <div style="font-size:11px;color:#888;margin-top:4px;">0 = step-through mode, 1 = real-time, 10+ = fast demo</div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="hideReplayModal()">Cancel</button>
      <button style="background:#e040fb;color:white;padding:7px 16px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;" onclick="startReplay()">Start Replay</button>
    </div>
  </div>
</div>

<!-- Replay Controls Bar (shown during replay) -->
<div id="replay-bar" style="display:none;background:#2a1040;border-bottom:1px solid #e040fb;padding:6px 20px;font-size:12px;color:#e0e0e0;align-items:center;gap:12px;">
  <span style="color:#e040fb;font-weight:700;">REPLAY</span>
  <span id="replay-summary-info" style="color:#aaa;font-size:11px;"></span>
  <span id="replay-progress-text">0%</span>
  <div style="flex:1;height:4px;background:#333;border-radius:2px;margin:0 12px;">
    <div id="replay-progress-bar" style="height:100%;background:#e040fb;border-radius:2px;width:0%;transition:width 0.3s;"></div>
  </div>
  <span id="replay-agent-name" style="color:#4fc3f7;"></span>
  <span id="replay-cost" style="color:#81c784;font-weight:600;"></span>
  <button onclick="replayPause()" id="replay-btn-pause" style="padding:4px 10px;border:none;border-radius:3px;background:#e65100;color:white;font-size:11px;cursor:pointer;">Pause</button>
  <button onclick="replayResume()" id="replay-btn-resume" style="display:none;padding:4px 10px;border:none;border-radius:3px;background:#1b5e20;color:#a5d6a7;font-size:11px;cursor:pointer;">Resume</button>
  <button onclick="replayStep()" id="replay-btn-step" style="display:none;padding:4px 10px;border:none;border-radius:3px;background:#0288d1;color:white;font-size:11px;cursor:pointer;">Step</button>
  <button onclick="replayStop()" style="padding:4px 10px;border:none;border-radius:3px;background:#b71c1c;color:#ef9a9a;font-size:11px;cursor:pointer;">Stop</button>
</div>

<script>
let ws;
let selectedAgent = null;
let currentView = 'agent';
let agents = {};
let specs = [];
let agentMessages = {};
let allMessages = [];
let totalCost = 0;
let isRunning = false;
let pendingMessages = [];
let savedList = [];
let chatList = [];
let checkpointList = [];
let loadedChat = null;

function wsSend(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  } else {
    pendingMessages.push(obj);
  }
}

function classifyMsg(text) {
  if (text === '[thinking...]') return 'status';
  if (text.startsWith('[tool]')) return 'tool';
  if (text.startsWith('[tool_result]')) return 'tool_result';
  if (text.startsWith('[From ') || text.startsWith('[Notification') || text.startsWith('[STALL') || text.startsWith('[HEARTBEAT')) return 'notification';
  if (text.startsWith('[Waiting') || text.startsWith('[Polling') || text.startsWith('[Compacting')) return 'status';
  return 'normal';
}

const AGENT_COLORS = ['#4fc3f7','#81c784','#ffcc02','#ce93d8','#ef9a9a','#80cbc4','#ffab91','#b39ddb'];
function agentColor(name) {
  const idx = Object.keys(agents).indexOf(name);
  return AGENT_COLORS[idx >= 0 ? idx % AGENT_COLORS.length : 0];
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = () => { document.body.classList.add('connected'); pendingMessages.forEach(m => ws.send(JSON.stringify(m))); pendingMessages = []; };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.agents !== undefined && data.specs !== undefined) {
      // Full state restore (handles page refresh / reconnect)
      Object.entries(data.agents).forEach(([name, info]) => { agents[name] = info; });
      specs = data.specs;
      isRunning = data.running;
      savedList = data.saved_list || [];
      // Restore message history from server
      allMessages = (data.all_messages || []).map(m => ({
        text: m.data || '', type: classifyMsg(m.data || ''), agent: m.agent, ts: m.timestamp_ms
      }));
      agentMessages = {};
      if (data.agent_messages) {
        Object.entries(data.agent_messages).forEach(([name, msgs]) => {
          agentMessages[name] = msgs.map(m => ({
            text: m.data || '', type: classifyMsg(m.data || ''), agent: name, ts: m.timestamp_ms
          }));
        });
      }
      Object.keys(agents).forEach(name => { if (!agentMessages[name]) agentMessages[name] = []; });
      if (data.total_cost != null) window._swarmTotalCost = data.total_cost;
      updateCostDisplay();
      render();
    } else if (data.type === 'agent_event') {
      handleEvent(data);
    } else if (data.type === 'specs_updated') {
      specs = data.specs;
      render();
    } else if (data.type === 'swarm_started') {
      isRunning = true;
      specs.forEach(s => { agents[s.name] = { name: s.name, status: 'pending' }; agentMessages[s.name] = []; });
      render();
    } else if (data.type === 'swarm_completed') {
      isRunning = false;
      Object.entries(data.results).forEach(([name, r]) => { if (agents[name]) Object.assign(agents[name], r); });
      render();
    } else if (data.type === 'reset') {
      agents = {}; specs = []; agentMessages = {}; allMessages = []; isRunning = false; selectedAgent = null;
      render();
    } else if (data.type === 'swarm_saved') {
      savedList = data.saved_list || [];
      alert(`Swarm '${data.name}' saved.`);
    } else if (data.type === 'swarm_loaded') {
      alert(`Swarm '${data.name}' loaded.`);
      render();
    } else if (data.type === 'swarm_deleted') {
      savedList = data.saved_list || [];
      renderLoadModal();
    } else if (data.type === 'saved_list') {
      savedList = data.saved_list || [];
      renderLoadModal();
    } else if (data.type === 'swarm_resumed') {
      isRunning = true;
      render();
    } else if (data.type === 'chat_saved') {
      alert(`Chat saved: ${data.filename}`);
    } else if (data.type === 'chat_list') {
      chatList = data.chats || [];
      if (currentView === 'history') renderMessages();
    } else if (data.type === 'chat_loaded') {
      loadedChat = data.chat;
      if (currentView === 'history') renderMessages();
    } else if (data.type === 'replay_started') {
      replayActive = true;
      isRunning = true;
      agents = {}; agentMessages = {}; allMessages = [];
      if (data.summary) updateReplaySummaryDisplay(data.summary);
      render();
    } else if (data.type === 'replay_stopped' || data.type === 'replay_completed') {
      replayActive = false;
      document.getElementById('replay-bar').style.display = 'none';
      stopReplayPoll();
      if (data.type === 'replay_completed') isRunning = false;
      render();
    } else if (data.type === 'ping') {
      // keepalive, ignore
    } else if (data.type === 'error') {
      alert('Server error: ' + (data.message || 'Unknown error'));
    }
  };
  ws.onclose = () => setTimeout(connect, 2000);
}

function handleEvent(ev) {
  const name = ev.agent;
  if (!agentMessages[name]) agentMessages[name] = [];
  if (!agents[name]) agents[name] = { name, status: 'running' };
  if (ev.event_type === 'message') {
    const text = ev.data || '';
    const type = classifyMsg(text);
    agentMessages[name].push({ text, type, agent: name, ts: ev.timestamp_ms });
    allMessages.push({ text, type, agent: name, ts: ev.timestamp_ms });
  } else if (ev.event_type === 'query') {
    const text = `📤 QUERY: ${ev.data || ''}`;
    agentMessages[name].push({ text, type: 'query', agent: name, ts: ev.timestamp_ms });
    allMessages.push({ text, type: 'query', agent: name, ts: ev.timestamp_ms });
  } else if (ev.event_type === 'status_change') {
    if (!agents[name]) agents[name] = { name, status: ev.data, spawned_by: ev.spawned_by || null };
    else agents[name].status = ev.data;
    agentMessages[name].push({ text: `status: ${ev.data}`, type: 'status', agent: name, ts: ev.timestamp_ms });
    allMessages.push({ text: `[${name}] status: ${ev.data}`, type: 'status', agent: name, ts: ev.timestamp_ms });
  } else if (ev.event_type === 'heartbeat') {
    if (!agents[name]) agents[name] = { name };
    agents[name].last_heartbeat = Date.now();
    // Don't add to message log — just update sidebar
    renderSidebar();
    return;
  } else if (ev.event_type === 'cost_estimate' && ev.data) {
    if (!agents[name]) agents[name] = { name };
    agents[name].cost_usd = parseFloat(ev.data);
    agents[name].cost_is_estimate = true;
    if (ev.total_cost != null) window._swarmTotalCost = ev.total_cost;
    updateCostDisplay();
  } else if (ev.event_type === 'cost_update' && ev.data) {
    if (!agents[name]) agents[name] = { name };
    agents[name].cost_usd = parseFloat(ev.data);
    agents[name].cost_is_estimate = false;
    if (ev.total_cost != null) window._swarmTotalCost = ev.total_cost;
    updateCostDisplay();
  } else if (ev.event_type === 'state_transition' && ev.data) {
    handleStateTransitionEvent(name, ev.data);
  }
  render();
}

function render() {
  renderSidebar();
  // Only re-render messages for views that use the messages panel
  if (currentView === 'agent' || currentView === 'chitchat' || currentView === 'spec' || currentView === 'history') {
    renderMessages();
  }
  updateTargetDropdown();
  document.getElementById('btn-start').disabled = isRunning || specs.length === 0;
}

function escapeHtml(t) { return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeAttr(t) { return (t||'').replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function updateCostDisplay() {
  // Use swarm-level total_cost (persists across agent removal) if available
  if (window._swarmTotalCost != null) {
    totalCost = window._swarmTotalCost;
  } else {
    totalCost = Object.values(agents).reduce((s, a) => s + (a.cost_usd || 0), 0);
  }
  // Separate estimate (running agents) from confirmed (completed)
  let confirmed = 0, estimated = 0;
  Object.values(agents).forEach(a => {
    if (a.cost_usd) {
      if (a.cost_is_estimate) estimated += a.cost_usd;
      else confirmed += a.cost_usd;
    }
  });
  let display = `$${totalCost.toFixed(4)}`;
  if (estimated > 0) display += ` (~$${estimated.toFixed(4)} est)`;
  document.getElementById('total-cost').textContent = display;
}
function formatCost(a) { return a.cost_usd ? `${a.cost_is_estimate ? '~' : ''}$${a.cost_usd.toFixed(4)}` : ''; }

function selectAgent(name) { selectedAgent = name; document.getElementById('msg-target').value = name; render(); }

  currentView = v;
  document.getElementById('tab-agent').classList.toggle('active', v==='agent');
  document.getElementById('tab-chitchat').classList.toggle('active', v==='chitchat');
  document.getElementById('tab-spec').classList.toggle('active', v==='spec');
  document.getElementById('tab-history').classList.toggle('active', v==='history');
  document.getElementById('tab-telemetry').classList.toggle('active', v==='telemetry');
  document.getElementById('tab-nudges').classList.toggle('active', v==='nudges');
  document.getElementById('tab-statemachine').classList.toggle('active', v==='statemachine');
  document.getElementById('tab-lemmadag').classList.toggle('active', v==='lemmadag');
  if (v === 'history') { fetchCheckpointList(); }
  else if (v === 'telemetry') { refreshTelemetry(); }
  else if (v === 'nudges') { refreshNudges(); }
  else if (v === 'statemachine') { refreshStateMachine(); }
  else if (v === 'lemmadag') { refreshLemmaDag(); }
  else { renderMessages(); }
}

// State Machine visualization — mermaid.js + live WebSocket updates
let smCache = {}; // agent_name → {states, transitions, current_state, state_data, module, lastTransition}
let smTransitionHistory = {}; // agent_name → [{from, to, transition, ts}]
let smRenderCounter = 0;

mermaid.initialize({ startOnLoad: false, theme: 'dark', themeVariables: {
  primaryColor: '#1e2a3a', primaryBorderColor: '#4fc3f7', primaryTextColor: '#e0e0e0',
  lineColor: '#555', stateBkg: '#1e2a3a', stateBorder: '#4fc3f7',
}});

function refreshStateMachine() {
  const el = document.getElementById('messages');
  el.innerHTML = '<div class="empty">Loading state machines...</div>';
  fetch('/api/agents/live').then(r => r.json()).then(liveData => {
    const moduleAgents = (liveData.agents || []).map(a => a.name);
    if (!moduleAgents.length) {
      el.innerHTML = '<div class="empty">No agents running. Start the swarm to see state machines.</div>';
      return;
    }
    Promise.all(moduleAgents.map(name =>
      fetch(`/api/agents/${encodeURIComponent(name)}/state_machine`).then(r => r.json()).then(d => ({name, ...d}))
    )).then(results => {
      const valid = results.filter(r => r.states && r.transitions);
      if (!valid.length) {
        el.innerHTML = '<div class="empty">No module agents with state machines found.</div>';
        return;
      }
      valid.forEach(sm => {
        smCache[sm.agent] = sm;
        if (!smTransitionHistory[sm.agent]) smTransitionHistory[sm.agent] = [];
      });
      renderAllStateMachines();
    });
  });
}

function handleStateTransitionEvent(agentName, data) {
  let transData;
  try { transData = typeof data === 'string' ? JSON.parse(data) : data; } catch(e) { return; }
  if (!transData || !transData.from || !transData.to) return;

  if (smCache[agentName]) {
    smCache[agentName].current_state = transData.to;
    smCache[agentName].lastTransition = { from: transData.from, to: transData.to, transition: transData.transition, ts: Date.now() };
  }
  if (!smTransitionHistory[agentName]) smTransitionHistory[agentName] = [];
  smTransitionHistory[agentName].push({ ...transData, ts: Date.now() });
  if (smTransitionHistory[agentName].length > 50) smTransitionHistory[agentName].shift();

  if (currentView === 'statemachine') renderAllStateMachines();
}

async function renderAllStateMachines() {
  const el = document.getElementById('messages');
  const valid = Object.values(smCache).filter(sm => sm.states && sm.transitions);
  if (!valid.length) {
    el.innerHTML = '<div class="empty">No module agents with state machines found.</div>';
    return;
  }
  let html = '<div style="padding:16px;overflow-y:auto;">';
  for (const sm of valid) {
    html += await renderStateMachineGraph(sm);
  }
  html += '</div>';
  el.innerHTML = html;
}

async function renderStateMachineGraph(sm) {
  const transitions = sm.transitions || [];
  const current = sm.current_state;
  const stateData = sm.state_data || {};
  const lastTrans = sm.lastTransition;
  const history = smTransitionHistory[sm.agent] || [];
  const recentEdge = lastTrans && (Date.now() - lastTrans.ts < 3000) ? lastTrans : null;

  // Build mermaid diagram string
  let diagram = 'stateDiagram-v2\n';
  diagram += '  [*] --> ' + (transitions[0] ? transitions[0].from : 'idle') + '\n';

  // Group transitions by (from, to) to combine labels
  const edgeLabels = {};
  transitions.forEach(t => {
    const key = `${t.from}__${t.to}`;
    if (!edgeLabels[key]) edgeLabels[key] = [];
    edgeLabels[key].push(t.transition);
  });
  for (const [key, labels] of Object.entries(edgeLabels)) {
    const [from, to] = key.split('__');
    diagram += `  ${from} --> ${to} : ${labels.join(' / ')}\n`;
  }

  // Style classes
  diagram += '\n  classDef active fill:#1b5e20,stroke:#4caf50,stroke-width:2px,color:#a5d6a7,font-weight:bold\n';
  diagram += '  classDef fired fill:#4a3800,stroke:#ffab00,stroke-width:2px,color:#ffe082\n';
  diagram += '  classDef inactive fill:#1e2a3a,stroke:#555,stroke-width:1px,color:#e0e0e0\n';

  // Assign classes — inactive to all, then override active/fired
  const allStates = [...new Set(transitions.map(t => t.from).concat(transitions.map(t => t.to)))];
  const activeStates = new Set();
  if (current) activeStates.add(current);
  if (recentEdge && recentEdge.from !== current) activeStates.add(recentEdge.from);
  const inactiveStates = allStates.filter(s => !activeStates.has(s));
  if (inactiveStates.length) diagram += `  class ${inactiveStates.join(',')} inactive\n`;
  if (current) diagram += `  class ${current} active\n`;
  if (recentEdge && recentEdge.from !== current) diagram += `  class ${recentEdge.from} fired\n`;

  // Render with mermaid
  let svgHtml = '';
  try {
    const id = `sm-${sm.agent}-${smRenderCounter++}`;
    const { svg } = await mermaid.render(id, diagram);
    svgHtml = svg;
  } catch (e) {
    svgHtml = `<div style="color:#f44336;font-size:11px;">Mermaid render error: ${e.message}</div>`;
  }

  // State data panel
  let dataHtml = '';
  if (stateData && Object.keys(stateData).length > 0) {
    dataHtml = '<div style="background:#1e2a3a;border-radius:6px;padding:10px 14px;margin-bottom:12px;font-size:11px;font-family:monospace;color:#aaa;max-height:200px;overflow-y:auto;">';
    dataHtml += '<div style="color:#4fc3f7;font-weight:bold;margin-bottom:6px;">WorkflowState</div>';
    for (const [k, v] of Object.entries(stateData)) {
      const val = (typeof v === 'object' && v !== null) ? JSON.stringify(v) : String(v ?? 'null');
      const display = val.length > 80 ? val.slice(0, 80) + '...' : val;
      const highlight = k === 'stage' ? 'color:#4caf50;' : '';
      dataHtml += `<div style="${highlight}"><span style="color:#888;">${k}:</span> ${display}</div>`;
    }
    dataHtml += '</div>';
  }

  // Transition history
  let histHtml = '';
  if (history.length > 0) {
    histHtml = '<div style="background:#1a1a2e;border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:10px;font-family:monospace;color:#888;max-height:120px;overflow-y:auto;">';
    histHtml += '<div style="color:#666;margin-bottom:4px;">Recent transitions:</div>';
    history.slice(-10).reverse().forEach(h => {
      const age = Math.round((Date.now() - h.ts) / 1000);
      histHtml += `<div><span style="color:#ffab00;">${h.from}</span> →<span style="color:#80cbc4;">${h.transition}</span>→ <span style="color:#4caf50;">${h.to}</span> <span style="color:#555;">(${age}s ago)</span></div>`;
    });
    histHtml += '</div>';
  }

  return `<div style="margin-bottom:24px;">
    <h3 style="color:#4fc3f7;margin:0 0 8px;font-size:14px;">${sm.agent} <span style="font-size:11px;color:#888;font-weight:normal;">(${sm.module})</span></h3>
    <div style="background:#111;border-radius:8px;padding:16px;margin-bottom:12px;overflow-x:auto;">${svgHtml}</div>
    ${dataHtml}
    ${histHtml}
  </div>`;
}

// Lemma DAG visualization
let lemmaDagCounter = 0;

async function refreshLemmaDag() {
  const el = document.getElementById('messages');
  el.innerHTML = '<div class="empty">Loading lemma DAG...</div>';

  try {
    const resp = await fetch('/api/ledger/dag');
    const data = await resp.json();

    if (data.error) {
      el.innerHTML = `<div class="empty">${data.error}</div>`;
      return;
    }
    if (!data.nodes || data.nodes.length === 0) {
      el.innerHTML = '<div class="empty">No lemmas registered yet. Start a v4 proof session to see the DAG.</div>';
      return;
    }

    let html = '<div style="padding:16px;overflow-y:auto;">';

    // Stats bar
    const s = data.stats;
    html += `<div style="background:#1e2a3a;border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#ccc;display:flex;gap:16px;flex-wrap:wrap;">
      <span style="color:#4fc3f7;font-weight:bold;">Lemma DAG</span>
      <span>Total: <b>${s.total}</b></span>
      <span style="color:#4caf50;">Proved: <b>${s.proved}</b></span>
      <span style="color:#64b5f6;">Proving: <b>${s.proving}</b></span>
      <span style="color:#aaa;">Pending: <b>${s.pending}</b></span>
      <span style="color:#ef5350;">Failed: <b>${s.failed}</b></span>
      <span style="color:#ffa726;">Cycle: <b>${s.cycle}</b></span>
      <span style="color:#888;">Pruned: <b>${s.pruned}</b></span>
    </div>`;

    // Mermaid graph — zoomable and scrollable
    const mermaidCode = data.mermaid.replace(/```mermaid\n?/, '').replace(/```\n?$/, '');
    let svgHtml = '';
    try {
      const id = `lemma-dag-${lemmaDagCounter++}`;
      const { svg } = await mermaid.render(id, mermaidCode);
      svgHtml = svg;
    } catch (e) {
      svgHtml = `<div style="color:#f44336;font-size:11px;">Mermaid render error: ${e.message}<br><pre style="color:#888;font-size:10px;">${mermaidCode.slice(0,500)}</pre></div>`;
    }
    html += `<div id="dag-viewport" style="background:#111;border-radius:8px;padding:16px;margin-bottom:16px;overflow:auto;max-height:500px;position:relative;cursor:grab;">
      <div id="dag-inner" style="transform-origin:top left;transition:transform 0.1s;">${svgHtml}</div>
    </div>
    <div style="margin-bottom:12px;font-size:11px;color:#666;">
      Scroll to zoom • Drag to pan •
      <button onclick="dagZoom(1.2)" style="background:#333;color:#ccc;border:1px solid #555;border-radius:3px;padding:2px 8px;cursor:pointer;">+</button>
      <button onclick="dagZoom(0.8)" style="background:#333;color:#ccc;border:1px solid #555;border-radius:3px;padding:2px 8px;cursor:pointer;">−</button>
      <button onclick="dagZoom(0)" style="background:#333;color:#ccc;border:1px solid #555;border-radius:3px;padding:2px 8px;cursor:pointer;">Reset</button>
    </div>`;

    // Current lemma highlight
    const current = data.nodes.find(n => n.is_current);
    if (current) {
      html += `<div style="background:#1b3a5e;border:1px solid #4fc3f7;border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:12px;">
        <span style="color:#4fc3f7;font-weight:bold;">Currently proving:</span>
        <span style="color:#fff;">${current.name}</span>
        <span style="color:#888;margin-left:8px;">depth=${current.depth} | indegree=${current.indegree} | attempt=${current.attempts} | budget=${current.turn_budget} turns</span>
        <div style="color:#aaa;margin-top:4px;font-family:monospace;font-size:10px;">${current.statement_snippet}</div>
      </div>`;
    }

    // Node list table
    html += '<div style="background:#1a1a2e;border-radius:6px;padding:10px 14px;font-size:11px;font-family:monospace;max-height:300px;overflow-y:auto;">';
    html += '<table style="width:100%;border-collapse:collapse;color:#ccc;">';
    html += '<tr style="border-bottom:1px solid #333;color:#888;"><th style="text-align:left;padding:4px;">Name</th><th>Status</th><th>Depth</th><th>In°</th><th>Attempts</th><th>ID</th></tr>';
    const statusColors = { proved:'#4caf50', proving:'#64b5f6', pending:'#aaa', failed:'#ef5350', cycle:'#ffa726', pruned:'#666' };
    data.nodes.forEach(n => {
      const color = statusColors[n.status] || '#ccc';
      const highlight = n.is_current ? 'background:#1b3a5e;' : '';
      html += `<tr style="border-bottom:1px solid #222;${highlight}">
        <td style="padding:4px;color:${color};">${n.name}</td>
        <td style="text-align:center;color:${color};">${n.status}</td>
        <td style="text-align:center;">${n.depth}</td>
        <td style="text-align:center;${n.indegree > 1 ? 'color:#ffa726;font-weight:bold;' : ''}">${n.indegree}</td>
        <td style="text-align:center;">${n.attempts}</td>
        <td style="color:#555;">${n.id.slice(0,8)}</td>
      </tr>`;
    });
    html += '</table></div>';
    html += '</div>';
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = `<div class="empty">Error loading DAG: ${e.message}</div>`;
  }
}

// DAG zoom and pan
let dagScale = 1, dagPanX = 0, dagPanY = 0, dagDragging = false, dagStartX = 0, dagStartY = 0;
function dagZoom(factor) {
  if (factor === 0) { dagScale = 1; dagPanX = 0; dagPanY = 0; }
  else { dagScale *= factor; }
  dagScale = Math.max(0.3, Math.min(dagScale, 5));
  dagApplyTransform();
}
function dagApplyTransform() {
  const inner = document.getElementById('dag-inner');
  if (inner) inner.style.transform = `translate(${dagPanX}px, ${dagPanY}px) scale(${dagScale})`;
}
document.addEventListener('wheel', function(e) {
  const vp = document.getElementById('dag-viewport');
  if (vp && vp.contains(e.target)) {
    e.preventDefault();
    dagZoom(e.deltaY < 0 ? 1.1 : 0.9);
  }
}, {passive: false});
document.addEventListener('mousedown', function(e) {
  const vp = document.getElementById('dag-viewport');
  if (vp && vp.contains(e.target)) {
    dagDragging = true; dagStartX = e.clientX - dagPanX; dagStartY = e.clientY - dagPanY;
    vp.style.cursor = 'grabbing';
  }
});
document.addEventListener('mousemove', function(e) {
  if (dagDragging) {
    dagPanX = e.clientX - dagStartX; dagPanY = e.clientY - dagStartY;
    dagApplyTransform();
  }
});
document.addEventListener('mouseup', function() {
  if (dagDragging) {
    dagDragging = false;
    const vp = document.getElementById('dag-viewport');
    if (vp) vp.style.cursor = 'grab';
  }
});

// Budget control
function increaseBudget(agentName) {
  const amount = prompt(`Increase budget for "${agentName}" by how much ($)?`, "10");
  if (!amount) return;
  const val = parseFloat(amount);
  if (isNaN(val) || val <= 0) { alert('Invalid amount'); return; }
  fetch(`/api/agents/${encodeURIComponent(agentName)}/budget`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({amount: val})
  }).then(r => r.json()).then(d => {
    if (d.status === 'ok') alert(`${agentName} budget: $${d.old_budget} → $${d.new_budget}`);
    else alert(d.message || 'Failed');
  });
}

// Swarm controls
function createNew() { if (isRunning) { alert('Cancel the running swarm first.'); return; } wsSend({ action: 'create_new' }); }
function createCheckpoint() {
  fetch('/api/swarm/checkpoint', { method: 'POST' })
    .then(r => r.json())
    .then(d => { if (d.status === 'created') alert('Checkpoint created: ' + d.path); else alert(d.message || 'Failed'); });
}
function fetchCheckpointList() {
  fetch('/api/swarm/checkpoints')
    .then(r => r.json())
    .then(cps => { checkpointList = cps; renderMessages(); });
}
function resumeFromCheckpoint(name) {
  if (confirm('Resume from checkpoint "' + name + '"?')) {
    fetch('/api/swarm/resume_checkpoint', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({checkpoint: name}) })
      .then(r => r.json()).then(d => alert(d.status === 'resumed' ? 'Resumed from ' + name : (d.message || 'Failed')));
  }
}
function listCheckpoints() {
  fetch('/api/swarm/checkpoints')
    .then(r => r.json())
    .then(cps => {
      if (!cps.length) { alert('No checkpoints available.'); return; }
      const choice = prompt('Available checkpoints:\\n' + cps.map((c,i) => (i+1)+'. '+c).join('\\n') + '\\n\\nEnter number to resume:');
      if (!choice) return;
      const idx = parseInt(choice) - 1;
      if (idx >= 0 && idx < cps.length) {
        if (confirm('Resume from checkpoint "' + cps[idx] + '"?')) {
          fetch('/api/swarm/resume_checkpoint', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({checkpoint: cps[idx]}) })
            .then(r => r.json()).then(d => alert(d.status === 'resumed' ? 'Resumed from ' + cps[idx] : d.message));
        }
      }
    });
}
function loadChatHistory(name) { wsSend({ action: 'load_chat', name }); }
function resumeChat(name) { if (confirm(`Resume swarm from chat '${name}'? This will start all agents from their saved sessions.`)) { wsSend({ action: 'resume_chat', name }); switchView('chitchat'); } }
function deleteChat(name) { if (confirm(`Delete chat '${name}'?`)) wsSend({ action: 'delete_chat', name }); }
function unloadSwarm() { if (isRunning) { alert('Cancel the running swarm first.'); return; } specs = []; agents = {}; agentMessages = {}; allMessages = []; selectedAgent = null; wsSend({ action: 'create_new' }); }
function startSwarm() { if (isRunning) { alert('Swarm already running.'); return; } wsSend({ action: 'start' }); }
function pauseAll() { wsSend({ action: 'pause_all' }); }
function resumeAll() { wsSend({ action: 'resume_all' }); }
function cancelAll() { wsSend({ action: 'cancel' }); }
function removeAgent(name) { if (isRunning) { alert('Cannot edit while running.'); return; } wsSend({ action: 'remove_agent', agent: name }); }
function editAgent(name) {
  if (isRunning) { alert('Cannot edit while running.'); return; }
  const spec = specs.find(s => s.name === name);
  if (!spec) return;
  // Populate the add-agent modal with existing values for editing
  document.getElementById('agent-name').value = spec.name;
  document.getElementById('agent-system-prompt').value = spec.system_prompt;
  document.getElementById('agent-prompt').value = spec.prompt;
  document.getElementById('agent-allowed-tools').value = (spec.allowed_tools || []).join(', ');
  document.getElementById('agent-disallowed-tools').value = (spec.disallowed_tools || []).join(', ');
  document.getElementById('agent-max-turns').value = spec.max_turns || '';
  document.getElementById('agent-max-budget').value = spec.max_budget_usd || '';
  document.getElementById('agent-timeout').value = spec.timeout_seconds || '';
  document.getElementById('agent-is-super').checked = spec.is_super_agent || false;
  // Remove the old one, then show modal (re-adding will create updated version)
  wsSend({ action: 'remove_agent', agent: name });
  showAddAgent();
}

// Agent controls
function pauseAgent() { if (selectedAgent) wsSend({ action: 'pause', agent: selectedAgent }); }
function resumeAgent() { if (selectedAgent) wsSend({ action: 'resume', agent: selectedAgent }); }
function interruptAgent() {
  if (!selectedAgent) return;
  const msg = prompt(`Interrupt "${selectedAgent}" with message (or leave empty to just stop):`, '');
  if (msg === null) return;  // cancelled
  fetch(`/api/agents/${encodeURIComponent(selectedAgent)}/interrupt`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({message: msg || 'User interrupted. Stop what you are doing and wait for new instructions.'})
  }).then(r => r.json()).then(d => {
    if (d.status === 'ok') alert(`${selectedAgent} interrupted.`);
    else alert(d.message || 'Failed');
  });
}
function cancelAgent() { if (selectedAgent) wsSend({ action: 'cancel_agent', agent: selectedAgent }); }
function sendMessage() {
  const input = document.getElementById('msg-input');
  const targetSelect = document.getElementById('msg-target');
  const target = targetSelect.value;
  const msg = input.value.trim();
  if (!msg) return;
  if (!target) { alert('Select a target agent to send the message to.'); return; }

  if (target === '__all__') {
    Object.keys(agents).forEach(name => {
      wsSend({ action: 'send_message', agent: name, message: msg });
      if (agentMessages[name]) agentMessages[name].push({ text: `[user]: ${msg}`, type: 'injected', agent: 'user', ts: Date.now() });
    });
    allMessages.push({ text: `[user -> ALL]: ${msg}`, type: 'injected', agent: 'user', ts: Date.now() });
  } else {
    wsSend({ action: 'send_message', agent: target, message: msg });
    allMessages.push({ text: `[user -> ${target}]: ${msg}`, type: 'injected', agent: 'user', ts: Date.now() });
    if (agentMessages[target]) agentMessages[target].push({ text: `[user]: ${msg}`, type: 'injected', agent: 'user', ts: Date.now() });
  }
  input.value = '';
  renderMessages();
}

function updateTargetDropdown() {
  const select = document.getElementById('msg-target');
  const currentVal = select.value;
  const names = Object.keys(agents).length > 0 ? Object.keys(agents) : specs.map(s => s.name);
  let html = '<option value="">-- select target --</option>';
  html += '<option value="__all__">All Agents</option>';
  names.forEach(name => { html += `<option value="${name}">${name}</option>`; });
  select.innerHTML = html;
  // Restore selection
  if (currentVal && (names.includes(currentVal) || currentVal === '__all__')) select.value = currentVal;
  else if (selectedAgent && names.includes(selectedAgent)) select.value = selectedAgent;
}

// Add Agent Modal
function showAddAgent() { if (isRunning) { alert('Cannot add agents while running.'); return; } document.getElementById('modal-overlay').classList.add('visible'); document.getElementById('agent-name').focus(); }
function hideModal() { document.getElementById('modal-overlay').classList.remove('visible'); }
function addAgent() {
  const name = document.getElementById('agent-name').value.trim();
  const systemPrompt = document.getElementById('agent-system-prompt').value.trim();
  const prompt = document.getElementById('agent-prompt').value.trim();
  const allowed = document.getElementById('agent-allowed-tools').value.split(',').map(s=>s.trim()).filter(Boolean);
  const disallowed = document.getElementById('agent-disallowed-tools').value.split(',').map(s=>s.trim()).filter(Boolean);
  const maxTurns = parseInt(document.getElementById('agent-max-turns').value) || null;
  const maxBudget = parseFloat(document.getElementById('agent-max-budget').value) || null;
  const timeout = parseFloat(document.getElementById('agent-timeout').value) || null;
  const isSuper = document.getElementById('agent-is-super').checked;
  if (!name || !systemPrompt || !prompt) { alert('Name, system prompt, and task prompt are required.'); return; }
  const spec = { name, system_prompt: systemPrompt, prompt, allowed_tools: allowed, disallowed_tools: disallowed, max_turns: maxTurns, max_budget_usd: maxBudget, timeout_seconds: timeout, is_super_agent: isSuper };
  wsSend({ action: 'add_agent', spec });
  hideModal();
  // Clear form
  ['agent-name','agent-system-prompt','agent-prompt','agent-allowed-tools','agent-disallowed-tools','agent-max-turns','agent-max-budget','agent-timeout'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('agent-is-super').checked = false;
}

// Save/Load Swarm
function showSaveModal() {
  if (specs.length === 0) { alert('No agents to save. Add agents first.'); return; }
  document.getElementById('save-modal').classList.add('visible');
  document.getElementById('save-swarm-name').focus();
}
function hideSaveModal() { document.getElementById('save-modal').classList.remove('visible'); }
function saveSwarm() {
  const name = document.getElementById('save-swarm-name').value.trim();
  if (!name) { alert('Enter a name for this swarm.'); return; }
  wsSend({ action: 'save_swarm', name });
  hideSaveModal();
  document.getElementById('save-swarm-name').value = '';
}

function showLoadModal() {
  renderLoadModal();
  document.getElementById('load-modal').classList.add('visible');
  wsSend({ action: 'list_saved' });
}
function hideLoadModal() { document.getElementById('load-modal').classList.remove('visible'); }
function renderLoadModal() {
  const el = document.getElementById('saved-list-container');
  if (!savedList.length) {
    el.innerHTML = '<div style="color:#666;font-size:12px;padding:10px;">No saved swarms yet.</div>';
    return;
  }
  el.innerHTML = savedList.map(name => `
    <div class="saved-item">
      <span>${escapeHtml(name)}</span>
      <div>
        <button class="btn-load-item" onclick="loadSwarm('${escapeAttr(name)}')">Load</button>
        <button class="btn-delete-item" onclick="deleteSavedSwarm('${escapeAttr(name)}')">Delete</button>
      </div>
    </div>
  `).join('');
}
function loadSwarm(name) { wsSend({ action: 'load_swarm', name }); hideLoadModal(); }
function deleteSavedSwarm(name) {
  if (!confirm(`Delete saved swarm '${name}'?`)) return;
  wsSend({ action: 'delete_swarm', name });
}

// --- Replay ---
let replayActive = false;
let replayPollInterval = null;

function showReplayModal() {
  document.getElementById('replay-modal').classList.add('visible');
  fetch('/api/replay/sessions').then(r => r.json()).then(sessions => {
    const el = document.getElementById('replay-session-list');
    if (!sessions.length) {
      el.innerHTML = '<div style="color:#666;font-size:11px;padding:8px;">No sessions found in temp/sessions/</div>';
      return;
    }
    el.innerHTML = sessions.map(s => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#1a1a2e;border-radius:4px;margin-bottom:4px;font-size:12px;">
        <span><span style="color:#e040fb;">${escapeHtml(s.swarm)}</span> <span style="color:#888;">${s.timestamp} (${s.agent_count} agents)</span></span>
        <button onclick="document.getElementById('replay-session-path').value='${escapeAttr(s.path)}'" style="padding:3px 8px;border:none;border-radius:3px;background:#e040fb;color:white;font-size:10px;cursor:pointer;">Select</button>
      </div>
    `).join('');
  });
}
function hideReplayModal() { document.getElementById('replay-modal').classList.remove('visible'); }

function startReplay() {
  const sessionPath = document.getElementById('replay-session-path').value.trim();
  const speed = parseFloat(document.getElementById('replay-speed-slider').value);
  if (!sessionPath) { alert('Enter a session path'); return; }
  fetch('/api/replay/start', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({session_path: sessionPath, speed})
  }).then(r => r.json()).then(d => {
    if (d.status === 'started') {
      replayActive = true;
      hideReplayModal();
      document.getElementById('replay-bar').style.display = 'flex';
      if (speed === 0) {
        document.getElementById('replay-btn-pause').style.display = 'none';
        document.getElementById('replay-btn-resume').style.display = 'none';
        document.getElementById('replay-btn-step').style.display = 'inline-block';
      }
      startReplayPoll();
    } else {
      alert(d.message || 'Failed to start replay');
    }
  });
}

function replayPause() {
  fetch('/api/replay/pause', {method:'POST'}).then(r => r.json()).then(d => {
    if (d.status === 'paused') {
      document.getElementById('replay-btn-pause').style.display = 'none';
      document.getElementById('replay-btn-resume').style.display = 'inline-block';
      document.getElementById('replay-btn-step').style.display = 'inline-block';
    }
  });
}
function replayResume() {
  fetch('/api/replay/resume', {method:'POST'}).then(r => r.json()).then(d => {
    if (d.status === 'resumed') {
      document.getElementById('replay-btn-pause').style.display = 'inline-block';
      document.getElementById('replay-btn-resume').style.display = 'none';
      document.getElementById('replay-btn-step').style.display = 'none';
    }
  });
}
function replayStep() {
  fetch('/api/replay/step', {method:'POST'}).then(r => r.json()).then(d => {
    if (d.status === 'error') alert(d.message);
  });
}
function replayStop() {
  fetch('/api/replay/stop', {method:'POST'}).then(() => {
    replayActive = false;
    document.getElementById('replay-bar').style.display = 'none';
    stopReplayPoll();
  });
}

function updateReplaySummaryDisplay(summary) {
  if (!summary || !summary.cost_usd) return;
  const info = document.getElementById('replay-summary-info');
  const parts = [];
  if (summary.theorem) parts.push(summary.theorem);
  if (summary.time_seconds) parts.push(Math.round(summary.time_seconds / 60) + 'min');
  if (summary.proved != null && summary.total_lemmas != null) parts.push(summary.proved + '/' + summary.total_lemmas + ' proved');
  info.textContent = parts.join(' | ');
  document.getElementById('replay-cost').textContent = '$' + summary.cost_usd.toFixed(4);
}

function startReplayPoll() {
  stopReplayPoll();
  replayPollInterval = setInterval(() => {
    fetch('/api/replay/status').then(r => r.json()).then(d => {
      document.getElementById('replay-progress-text').textContent = d.progress_pct + '%';
      document.getElementById('replay-progress-bar').style.width = d.progress_pct + '%';
      document.getElementById('replay-agent-name').textContent = d.current_agent || '';
      if (d.summary) updateReplaySummaryDisplay(d.summary);
      if (!d.playing) {
        replayActive = false;
        document.getElementById('replay-bar').style.display = 'none';
        stopReplayPoll();
      }
    });
  }, 1000);
}
function stopReplayPoll() {
  if (replayPollInterval) { clearInterval(replayPollInterval); replayPollInterval = null; }
}

connect();
