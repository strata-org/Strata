<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StrataSwarm v2 Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
header { background: #16213e; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #0f3460; }
header h1 { font-size: 18px; color: #4fc3f7; }
.header-controls { display: flex; gap: 8px; align-items: center; }
.header-controls button { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
#total-cost { font-size: 13px; color: #81c784; margin-right: 12px; }
.btn-create { background: #7c4dff; color: white; }
.btn-start { background: #00c853; color: white; }
.btn-pause-all { background: #e65100; color: white; }
.btn-resume-all { background: #1b5e20; color: white; }
.btn-cancel-all { background: #b71c1c; color: white; }
.btn-start:disabled, .btn-create:disabled { opacity: 0.5; cursor: not-allowed; }
.container { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 280px; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; }
.sidebar-header { padding: 10px 14px; font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; border-bottom: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
.sidebar-header button { padding: 3px 8px; border: none; border-radius: 3px; cursor: pointer; font-size: 11px; background: #4fc3f7; color: #1a1a2e; font-weight: 600; }
.agent-list { flex: 1; overflow-y: auto; }
.agent-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #0f3460; transition: background 0.2s; }
.agent-item:hover, .agent-item.active { background: #1a1a2e; }
.agent-item .name { font-weight: 600; font-size: 13px; }
.agent-item .meta { font-size: 11px; color: #888; margin-top: 3px; }
.agent-item .spec-info { font-size: 10px; color: #666; margin-top: 2px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; margin-left: 6px; }
.badge-pending { background: #424242; color: #bbb; }
.badge-running { background: #1b5e20; color: #a5d6a7; }
.badge-paused { background: #e65100; color: #ffcc02; }
.badge-completed { background: #004d40; color: #80cbc4; }
.badge-cancelled, .badge-failed { background: #b71c1c; color: #ef9a9a; }
.badge-halted { background: #4a148c; color: #ce93d8; }
.badge-draft { background: #37474f; color: #90a4ae; }
.main { flex: 1; display: flex; flex-direction: column; }
.view-tabs { display: flex; background: #16213e; border-bottom: 1px solid #0f3460; }
.view-tab { padding: 8px 16px; cursor: pointer; font-size: 12px; font-weight: 600; color: #888; border-bottom: 2px solid transparent; }
.view-tab.active { color: #4fc3f7; border-bottom-color: #4fc3f7; }
.messages { flex: 1; overflow-y: auto; padding: 12px 16px; }
.msg { margin-bottom: 6px; padding: 6px 10px; background: #1e2a3a; border-radius: 5px; font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.msg .msg-agent { font-weight: 700; font-size: 11px; margin-bottom: 2px; }
.msg.tool { background: #1a2e2a; border-left: 3px solid #80cbc4; font-family: monospace; font-size: 11px; }
.msg.tool_result { background: #1a2a2e; border-left: 3px solid #4fc3f7; font-family: monospace; font-size: 11px; }
.msg.injected { background: #2e1a3a; border-left: 3px solid #ce93d8; }
.msg.notification { background: #2a2a1a; border-left: 3px solid #ffcc02; font-size: 11px; }
.msg.status { background: transparent; color: #666; font-size: 11px; padding: 2px 10px; }
.controls { display: flex; gap: 8px; padding: 10px 14px; background: #16213e; border-top: 1px solid #0f3460; align-items: center; }
.controls button { padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; }
.btn-pause { background: #e65100; color: white; }
.btn-resume { background: #1b5e20; color: white; }
.btn-cancel { background: #b71c1c; color: white; }
.controls input { flex: 1; padding: 7px 10px; border: 1px solid #0f3460; border-radius: 4px; background: #1a1a2e; color: #e0e0e0; font-size: 12px; }
.controls input::placeholder { color: #555; }
.btn-send { background: #4fc3f7; color: #1a1a2e; }
.empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #555; font-size: 13px; }
/* Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.visible { display: flex; }
.modal { background: #16213e; border-radius: 8px; padding: 20px; width: 500px; max-height: 80vh; overflow-y: auto; border: 1px solid #0f3460; }
.modal h2 { font-size: 16px; color: #4fc3f7; margin-bottom: 14px; }
.modal label { display: block; font-size: 12px; color: #aaa; margin-top: 10px; margin-bottom: 4px; }
.modal input, .modal textarea { width: 100%; padding: 8px 10px; border: 1px solid #0f3460; border-radius: 4px; background: #1a1a2e; color: #e0e0e0; font-size: 12px; font-family: inherit; }
.modal textarea { min-height: 60px; resize: vertical; }
.modal .row { display: flex; gap: 10px; }
.modal .row > div { flex: 1; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.modal-actions button { padding: 7px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
.btn-modal-add { background: #4fc3f7; color: #1a1a2e; }
.btn-modal-cancel { background: #424242; color: #ccc; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.btn-save { background: #0288d1; color: white; }
.btn-load { background: #6a1b9a; color: white; }
.saved-list { margin-top: 10px; }
.saved-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: #1a1a2e; border-radius: 4px; margin-bottom: 6px; font-size: 12px; }
.saved-item button { padding: 3px 8px; border: none; border-radius: 3px; cursor: pointer; font-size: 11px; font-weight: 600; margin-left: 6px; }
.saved-item .btn-load-item { background: #6a1b9a; color: white; }
.saved-item .btn-delete-item { background: #b71c1c; color: #ef9a9a; }
</style>
</head>
<body>
<header>
  <h1>StrataSwarm v2</h1>
  <div class="header-controls">
    <span id="total-cost">$0.0000</span>
    <button class="btn-save" onclick="showSaveModal()">Save</button>
    <button class="btn-load" onclick="showLoadModal()">Load</button>
    <button style="background:#2e7d32;color:#c8e6c9;padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;" onclick="createCheckpoint()">Checkpoint</button>
    <button style="background:#37474f;color:#90a4ae;padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;" onclick="listCheckpoints()">Resume</button>
    <button class="btn-create" onclick="createNew()" title="Clear all agents and start fresh">New</button>
    <button class="btn-cancel" onclick="unloadSwarm()" title="Unload current agents (keeps saved configs)">Unload</button>
    <button class="btn-start" id="btn-start" onclick="startSwarm()">Start</button>
    <button class="btn-pause-all" onclick="pauseAll()">Pause All</button>
    <button class="btn-resume-all" onclick="resumeAll()">Resume All</button>
    <button class="btn-cancel-all" onclick="cancelAll()">Cancel All</button>
  </div>
</header>
<div class="container">
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Agents</span>
      <button onclick="showAddAgent()">+ Add Agent</button>
    </div>
    <div class="agent-list" id="agent-list"></div>
  </div>
  <div class="main">
    <div class="view-tabs">
      <div class="view-tab active" onclick="switchView('agent')" id="tab-agent">Agent View</div>
      <div class="view-tab" onclick="switchView('chitchat')" id="tab-chitchat">All Messages</div>
      <div class="view-tab" onclick="switchView('spec')" id="tab-spec">Agent Spec</div>
      <div class="view-tab" onclick="switchView('history')" id="tab-history">Checkpoints</div>
      <div class="view-tab" onclick="switchView('telemetry')" id="tab-telemetry">Telemetry</div>
      <div class="view-tab" onclick="switchView('nudges')" id="tab-nudges">Nudges</div>
    </div>
    <div class="messages" id="messages"><div class="empty">Add agents and start the swarm</div></div>
    <div class="controls">
      <button class="btn-pause" onclick="pauseAgent()">Pause</button>
      <button class="btn-resume" onclick="resumeAgent()">Resume</button>
      <button class="btn-cancel" onclick="cancelAgent()">Cancel</button>
      <select id="msg-target" style="padding:6px 8px;border:1px solid #0f3460;border-radius:4px;background:#1a1a2e;color:#e0e0e0;font-size:12px;min-width:120px;">
        <option value="">-- select target --</option>
      </select>
      <input type="text" id="msg-input" placeholder="Type message..." onkeydown="if(event.key==='Enter')sendMessage()" style="flex:1;">
      <button class="btn-send" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<!-- Add Agent Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)hideModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Add Agent</h2>
    <label>Name</label>
    <input type="text" id="agent-name" placeholder="e.g. researcher">
    <label>System Prompt (role + collaborators)</label>
    <textarea id="agent-system-prompt" placeholder="You are the Researcher. You work with: writer (summarizes findings)."></textarea>
    <label>Task Prompt</label>
    <textarea id="agent-prompt" placeholder="Find the highest revenue month in metrics.csv and send it to writer."></textarea>
    <label>Allowed Tools (comma-separated)</label>
    <input type="text" id="agent-allowed-tools" placeholder="Bash, Read, Grep">
    <label>Disallowed Tools (comma-separated, optional)</label>
    <input type="text" id="agent-disallowed-tools" placeholder="Edit, Write">
    <div class="row">
      <div><label>Max Turns</label><input type="number" id="agent-max-turns" placeholder="10"></div>
      <div><label>Max Budget ($)</label><input type="number" id="agent-max-budget" step="0.01" placeholder="0.50"></div>
      <div><label>Timeout (s)</label><input type="number" id="agent-timeout" placeholder="120"></div>
    </div>
    <label style="margin-top:12px;display:flex;align-items:center;gap:8px;cursor:pointer;">
      <input type="checkbox" id="agent-is-super" style="width:auto;">
      <span>SuperAgent (can spawn sub-agents)</span>
    </label>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="hideModal()">Cancel</button>
      <button class="btn-modal-add" onclick="addAgent()">Add Agent</button>
    </div>
  </div>
</div>

<!-- Save Swarm Modal -->
<div class="modal-overlay" id="save-modal" onclick="if(event.target===this)hideSaveModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Save Swarm</h2>
    <label>Swarm Name</label>
    <input type="text" id="save-swarm-name" placeholder="e.g. security-test" onkeydown="if(event.key==='Enter')saveSwarm()">
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="hideSaveModal()">Cancel</button>
      <button class="btn-modal-add" onclick="saveSwarm()">Save</button>
    </div>
  </div>
</div>

<!-- Load Swarm Modal -->
<div class="modal-overlay" id="load-modal" onclick="if(event.target===this)hideLoadModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Load Swarm</h2>
    <div class="saved-list" id="saved-list-container"></div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="hideLoadModal()">Close</button>
    </div>
  </div>
</div>

<script>
let ws;
let selectedAgent = null;
let currentView = 'agent';
let agents = {};
let specs = [];
let agentMessages = {};
let allMessages = [];
let totalCost = 0;
let isRunning = false;
let pendingMessages = [];
let savedList = [];
let chatList = [];
let checkpointList = [];
let loadedChat = null;

function wsSend(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  } else {
    pendingMessages.push(obj);
  }
}

function classifyMsg(text) {
  if (text === '[thinking...]') return 'status';
  if (text.startsWith('[tool]')) return 'tool';
  if (text.startsWith('[tool_result]')) return 'tool_result';
  if (text.startsWith('[From ') || text.startsWith('[Notification') || text.startsWith('[STALL') || text.startsWith('[HEARTBEAT')) return 'notification';
  if (text.startsWith('[Waiting') || text.startsWith('[Polling') || text.startsWith('[Compacting')) return 'status';
  return 'normal';
}

const AGENT_COLORS = ['#4fc3f7','#81c784','#ffcc02','#ce93d8','#ef9a9a','#80cbc4','#ffab91','#b39ddb'];
function agentColor(name) {
  const idx = Object.keys(agents).indexOf(name);
  return AGENT_COLORS[idx >= 0 ? idx % AGENT_COLORS.length : 0];
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = () => { document.body.classList.add('connected'); pendingMessages.forEach(m => ws.send(JSON.stringify(m))); pendingMessages = []; };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.agents !== undefined && data.specs !== undefined) {
      // Full state restore (handles page refresh / reconnect)
      Object.entries(data.agents).forEach(([name, info]) => { agents[name] = info; });
      specs = data.specs;
      isRunning = data.running;
      savedList = data.saved_list || [];
      // Restore message history from server
      allMessages = (data.all_messages || []).map(m => ({
        text: m.data || '', type: classifyMsg(m.data || ''), agent: m.agent, ts: m.timestamp_ms
      }));
      agentMessages = {};
      if (data.agent_messages) {
        Object.entries(data.agent_messages).forEach(([name, msgs]) => {
          agentMessages[name] = msgs.map(m => ({
            text: m.data || '', type: classifyMsg(m.data || ''), agent: name, ts: m.timestamp_ms
          }));
        });
      }
      Object.keys(agents).forEach(name => { if (!agentMessages[name]) agentMessages[name] = []; });
      render();
    } else if (data.type === 'agent_event') {
      handleEvent(data);
    } else if (data.type === 'specs_updated') {
      specs = data.specs;
      render();
    } else if (data.type === 'swarm_started') {
      isRunning = true;
      specs.forEach(s => { agents[s.name] = { name: s.name, status: 'pending' }; agentMessages[s.name] = []; });
      render();
    } else if (data.type === 'swarm_completed') {
      isRunning = false;
      Object.entries(data.results).forEach(([name, r]) => { if (agents[name]) Object.assign(agents[name], r); });
      render();
    } else if (data.type === 'reset') {
      agents = {}; specs = []; agentMessages = {}; allMessages = []; isRunning = false; selectedAgent = null;
      render();
    } else if (data.type === 'swarm_saved') {
      savedList = data.saved_list || [];
      alert(`Swarm '${data.name}' saved.`);
    } else if (data.type === 'swarm_loaded') {
      alert(`Swarm '${data.name}' loaded.`);
      render();
    } else if (data.type === 'swarm_deleted') {
      savedList = data.saved_list || [];
      renderLoadModal();
    } else if (data.type === 'saved_list') {
      savedList = data.saved_list || [];
      renderLoadModal();
    } else if (data.type === 'swarm_resumed') {
      isRunning = true;
      render();
    } else if (data.type === 'chat_saved') {
      alert(`Chat saved: ${data.filename}`);
    } else if (data.type === 'chat_list') {
      chatList = data.chats || [];
      if (currentView === 'history') renderMessages();
    } else if (data.type === 'chat_loaded') {
      loadedChat = data.chat;
      if (currentView === 'history') renderMessages();
    } else if (data.type === 'ping') {
      // keepalive, ignore
    } else if (data.type === 'error') {
      alert('Server error: ' + (data.message || 'Unknown error'));
    }
  };
  ws.onclose = () => setTimeout(connect, 2000);
}

function handleEvent(ev) {
  const name = ev.agent;
  if (!agentMessages[name]) agentMessages[name] = [];
  if (ev.event_type === 'message') {
    const text = ev.data || '';
    const type = classifyMsg(text);
    agentMessages[name].push({ text, type, agent: name, ts: ev.timestamp_ms });
    allMessages.push({ text, type, agent: name, ts: ev.timestamp_ms });
  } else if (ev.event_type === 'status_change') {
    if (!agents[name]) agents[name] = { name, status: ev.data, spawned_by: ev.spawned_by || null };
    else agents[name].status = ev.data;
    agentMessages[name].push({ text: `status: ${ev.data}`, type: 'status', agent: name, ts: ev.timestamp_ms });
    allMessages.push({ text: `[${name}] status: ${ev.data}`, type: 'status', agent: name, ts: ev.timestamp_ms });
  } else if (ev.event_type === 'heartbeat') {
    if (!agents[name]) agents[name] = { name };
    agents[name].last_heartbeat = Date.now();
    // Don't add to message log — just update sidebar
    renderSidebar();
    return;
  } else if (ev.event_type === 'cost_estimate' && ev.data) {
    if (!agents[name]) agents[name] = { name };
    agents[name].cost_usd = parseFloat(ev.data);
    agents[name].cost_is_estimate = true;
    updateCostDisplay();
  } else if (ev.event_type === 'cost_update' && ev.data) {
    if (!agents[name]) agents[name] = { name };
    agents[name].cost_usd = parseFloat(ev.data);
    agents[name].cost_is_estimate = false;
    updateCostDisplay();
  }
  render();
}

function render() {
  renderSidebar();
  renderMessages();
  updateTargetDropdown();
  document.getElementById('btn-start').disabled = isRunning || specs.length === 0;
}

function renderSidebar() {
  const el = document.getElementById('agent-list');
  // Show specs (draft) if swarm not running, otherwise show live agents
  if (!isRunning && Object.keys(agents).length === 0) {
    el.innerHTML = specs.map(s => `
      <div class="agent-item ${s.name === selectedAgent ? 'active' : ''}" onclick="selectAgent('${escapeAttr(s.name)}')">
        <div class="name" style="display:flex;justify-content:space-between;align-items:center;">
          <span>${escapeHtml(s.name)} <span class="badge badge-draft">draft</span>${s.is_super_agent ? ' <span class="badge" style="background:#ff6f00;color:white;">super</span>' : ''}</span>
          <span>
            <button onclick="event.stopPropagation();editAgent('${escapeAttr(s.name)}')" style="padding:2px 6px;border:none;border-radius:3px;background:#0288d1;color:white;font-size:10px;cursor:pointer;margin-right:3px;">Edit</button>
            <button onclick="event.stopPropagation();removeAgent('${escapeAttr(s.name)}')" style="padding:2px 6px;border:none;border-radius:3px;background:#b71c1c;color:#ef9a9a;font-size:10px;cursor:pointer;">X</button>
          </span>
        </div>
        <div class="spec-info">${(s.allowed_tools||[]).join(', ') || 'no tools'} | ${s.max_turns || '?'} turns | $${s.max_budget_usd || '?'}</div>
      </div>
    `).join('') || '';
    // Show saved swarms when no agents are loaded
    if (specs.length === 0 && savedList.length > 0) {
      el.innerHTML += `
        <div style="padding:12px 14px;border-bottom:1px solid #0f3460;">
          <div style="font-size:11px;color:#888;text-transform:uppercase;margin-bottom:8px;">Saved Swarms</div>
          ${savedList.map(name => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:#1a1a2e;border-radius:4px;margin-bottom:4px;font-size:12px;">
              <span>${escapeHtml(name)}</span>
              <button onclick="loadSwarm('${escapeAttr(name)}')" style="padding:3px 8px;border:none;border-radius:3px;background:#6a1b9a;color:white;font-size:10px;cursor:pointer;">Load</button>
            </div>
          `).join('')}
        </div>`;
    } else if (specs.length === 0) {
      el.innerHTML += '<div class="empty" style="padding:20px;font-size:12px;">No agents yet. Click "+ Add Agent" or Load a saved swarm.</div>';
    }
  } else {
    el.innerHTML = Object.values(agents).map(a => {
      const alive = a.last_heartbeat && (Date.now() - a.last_heartbeat < 8000) && a.status === 'running';
      const pulse = alive ? '<span style="display:inline-block;width:6px;height:6px;background:#00c853;border-radius:50%;margin-left:6px;animation:pulse 1s infinite;"></span>' : '';
      const subBadge = a.spawned_by ? ` <span class="badge" style="background:#455a64;color:#b0bec5;">sub:${escapeHtml(a.spawned_by)}</span>` : '';
      return `
      <div class="agent-item ${a.name === selectedAgent ? 'active' : ''}" onclick="selectAgent('${escapeAttr(a.name)}')" ${a.spawned_by ? 'style="padding-left:28px;border-left:2px solid #455a64;"' : ''}>
        <div class="name">${escapeHtml(a.name)} <span class="badge badge-${a.status || 'pending'}">${a.status || 'pending'}</span>${subBadge}${pulse}</div>
        <div class="meta">${formatCost(a)} ${a.num_turns ? a.num_turns + ' turns' : ''} ${a.halted_by && a.halted_by !== 'completion' ? '(' + a.halted_by + ')' : ''} <button onclick="event.stopPropagation();increaseBudget('${escapeAttr(a.name)}')" style="padding:1px 5px;border:none;border-radius:2px;background:#2e7d32;color:#c8e6c9;font-size:9px;cursor:pointer;margin-left:4px;">+$</button></div>
      </div>`;
    }).join('');
  }
}

function renderMessages() {
  const el = document.getElementById('messages');

  // Don't overwrite these views — they manage their own content
  if (currentView === 'telemetry' || currentView === 'nudges') return;

  if (currentView === 'history') {
    if (loadedChat) {
      // Show loaded chat content
      const chat = loadedChat;
      const agentNames = (chat.agents || []).map(a => a.name);
      const msgs = chat.all_messages || [];
      let html = `<div style="margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #0f3460;">
        <div style="font-size:14px;font-weight:700;color:#4fc3f7;">${escapeHtml(chat.timestamp || '')}</div>
        <div style="font-size:11px;color:#888;margin-top:4px;">Agents: ${agentNames.map(n => escapeHtml(n)).join(', ')}</div>
        <button onclick="loadedChat=null;renderMessages();" style="margin-top:6px;padding:4px 10px;border:none;border-radius:3px;background:#424242;color:#ccc;font-size:11px;cursor:pointer;">Back to list</button>
      </div>`;
      html += msgs.map(m => {
        const color = m.agent ? agentColor(m.agent) : '#888';
        const agentTag = m.agent ? `<div class="msg-agent" style="color:${color}">${escapeHtml(m.agent)}</div>` : '';
        let type = 'normal';
        const text = m.data || '';
        if (text === '[thinking...]') type = 'status';
        else if (text.startsWith('[tool]')) type = 'tool';
        else if (text.startsWith('[tool_result]')) type = 'tool_result';
        else if (text.startsWith('[From ') || text.startsWith('[Notification')) type = 'notification';
        else if (m.event_type === 'status_change') type = 'status';
        return `<div class="msg ${type}">${agentTag}${escapeHtml(text)}</div>`;
      }).join('');
      el.innerHTML = html;
      // Only auto-scroll if user is already near the bottom
  if (el.scrollHeight - el.scrollTop - el.clientHeight < 100) {
    el.scrollTop = el.scrollHeight;
  }
    } else {
      // Show checkpoint list (populated by fetchCheckpointList)
      if (!checkpointList || !checkpointList.length) {
        el.innerHTML = '<div class="empty">No checkpoints yet. Use the "Checkpoint" button to create one.</div>';
      } else {
        el.innerHTML = `<div style="padding:4px 0;">
          ${checkpointList.map(name => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#1e2a3a;border-radius:5px;margin-bottom:6px;font-size:12px;">
              <span style="color:#4fc3f7;">${escapeHtml(name)}</span>
              <div>
                <button onclick="resumeFromCheckpoint('${escapeAttr(name)}')" style="padding:3px 8px;border:none;border-radius:3px;background:#1b5e20;color:#a5d6a7;font-size:10px;cursor:pointer;">Resume</button>
              </div>
            </div>
          `).join('')}
        </div>`;
      }
    }
    return;
  }

  if (currentView === 'spec') {
    // Look in original specs first, then in live agent data (for spawned sub-agents)
    let spec = specs.find(s => s.name === selectedAgent);
    if (!spec && agents[selectedAgent] && agents[selectedAgent].spec) {
      spec = agents[selectedAgent].spec;
    }
    if (!spec) {
      el.innerHTML = '<div class="empty">Select an agent to view its spec</div>';
      return;
    }
    el.innerHTML = `
      <div style="padding:8px 0;">
        <div style="font-size:14px;font-weight:700;color:#4fc3f7;margin-bottom:12px;">${escapeHtml(spec.name)}</div>
        <div style="margin-bottom:12px;">
          <div style="font-size:11px;color:#888;text-transform:uppercase;margin-bottom:4px;">System Prompt</div>
          <div style="background:#1e2a3a;padding:10px 12px;border-radius:5px;font-size:12px;line-height:1.6;white-space:pre-wrap;">${escapeHtml(spec.system_prompt)}</div>
        </div>
        <div style="margin-bottom:12px;">
          <div style="font-size:11px;color:#888;text-transform:uppercase;margin-bottom:4px;">Task Prompt</div>
          <div style="background:#1e2a3a;padding:10px 12px;border-radius:5px;font-size:12px;line-height:1.6;white-space:pre-wrap;">${escapeHtml(spec.prompt)}</div>
        </div>
        <div style="display:flex;gap:16px;flex-wrap:wrap;">
          <div>
            <div style="font-size:11px;color:#888;text-transform:uppercase;margin-bottom:4px;">Allowed Tools</div>
            <div style="font-size:12px;">${spec.allowed_tools.length ? spec.allowed_tools.map(t => `<span style="background:#1b5e20;color:#a5d6a7;padding:2px 6px;border-radius:3px;font-size:11px;margin-right:4px;">${escapeHtml(t)}</span>`).join('') : '<span style="color:#666;">none</span>'}</div>
          </div>
          <div>
            <div style="font-size:11px;color:#888;text-transform:uppercase;margin-bottom:4px;">Disallowed Tools</div>
            <div style="font-size:12px;">${spec.disallowed_tools.length ? spec.disallowed_tools.map(t => `<span style="background:#b71c1c;color:#ef9a9a;padding:2px 6px;border-radius:3px;font-size:11px;margin-right:4px;">${escapeHtml(t)}</span>`).join('') : '<span style="color:#666;">none</span>'}</div>
          </div>
        </div>
        <div style="display:flex;gap:16px;margin-top:12px;">
          <div style="font-size:12px;color:#aaa;">Max turns: <strong>${spec.max_turns || 'unlimited'}</strong></div>
          <div style="font-size:12px;color:#aaa;">Budget: <strong>${spec.max_budget_usd ? '$' + spec.max_budget_usd : 'unlimited'}</strong></div>
          <div style="font-size:12px;color:#aaa;">Timeout: <strong>${spec.timeout_seconds ? spec.timeout_seconds + 's' : 'none'}</strong></div>
          ${spec.is_super_agent ? '<div style="font-size:12px;color:#ff6f00;"><strong>SuperAgent</strong></div>' : ''}
          ${spec.spawned_by ? '<div style="font-size:12px;color:#90a4ae;">Spawned by: <strong>' + escapeHtml(spec.spawned_by) + '</strong></div>' : ''}
        </div>
      </div>`;
    return;
  }

  let msgs;
  if (currentView === 'chitchat') {
    msgs = allMessages;
  } else {
    msgs = selectedAgent ? (agentMessages[selectedAgent] || []) : [];
  }
  if (!msgs.length) {
    el.innerHTML = `<div class="empty">${currentView === 'chitchat' ? 'No messages yet' : (selectedAgent ? 'No messages for this agent' : 'Select an agent')}</div>`;
    return;
  }
  el.innerHTML = msgs.slice(-500).map(m => {
    const showAgent = currentView === 'chitchat' && m.agent;
    const color = m.agent ? agentColor(m.agent) : '#888';
    const agentTag = showAgent ? `<div class="msg-agent" style="color:${color}">${m.agent}</div>` : '';
    return `<div class="msg ${m.type}">${agentTag}${escapeHtml(m.text)}</div>`;
  }).join('');
  // Only auto-scroll if user is already near the bottom
  if (el.scrollHeight - el.scrollTop - el.clientHeight < 100) {
    el.scrollTop = el.scrollHeight;
  }
}

function escapeHtml(t) { return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeAttr(t) { return (t||'').replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function updateCostDisplay() {
  totalCost = Object.values(agents).reduce((s, a) => s + (a.cost_usd || 0), 0);
  const anyEstimate = Object.values(agents).some(a => a.cost_is_estimate);
  document.getElementById('total-cost').textContent = `${anyEstimate ? '~' : ''}$${totalCost.toFixed(4)}`;
}
function formatCost(a) { return a.cost_usd ? `${a.cost_is_estimate ? '~' : ''}$${a.cost_usd.toFixed(4)}` : ''; }

function selectAgent(name) { selectedAgent = name; document.getElementById('msg-target').value = name; render(); }
function switchView(v) {
  currentView = v;
  document.getElementById('tab-agent').classList.toggle('active', v==='agent');
  document.getElementById('tab-chitchat').classList.toggle('active', v==='chitchat');
  document.getElementById('tab-spec').classList.toggle('active', v==='spec');
  document.getElementById('tab-history').classList.toggle('active', v==='history');
  document.getElementById('tab-telemetry').classList.toggle('active', v==='telemetry');
  document.getElementById('tab-nudges').classList.toggle('active', v==='nudges');
  if (v === 'history') { fetchCheckpointList(); }
  if (v === 'telemetry') { refreshTelemetry(); }
  if (v === 'nudges') { refreshNudges(); }
  renderMessages();
}

function refreshTelemetry() {
  fetch('/api/telemetry')
    .then(r => r.json())
    .then(data => {
      const el = document.getElementById('messages');
      if (!data.agents || Object.keys(data.agents).length === 0) {
        el.innerHTML = '<div class="empty">No telemetry data yet. Start the swarm to see metrics.</div>';
        return;
      }
      let html = '<div style="padding:16px;font-family:monospace;font-size:12px;">';
      html += '<h3 style="color:#4fc3f7;margin:0 0 12px;">Telemetry Dashboard</h3>';
      html += '<table style="width:100%;border-collapse:collapse;color:#ccc;">';
      html += '<tr style="border-bottom:1px solid #333;color:#888;"><th style="text-align:left;padding:6px;">Agent</th><th>Events</th><th>Msgs Sent</th><th>Msgs Recv</th><th>Last Activity</th><th>Top Tools</th></tr>';
      for (const [name, info] of Object.entries(data.agents)) {
        const topTools = Object.entries(info.tool_calls || {})
          .sort((a,b) => b[1]-a[1])
          .slice(0,3)
          .map(([t,c]) => `${t}:${c}`)
          .join(', ') || '-';
        const lastAge = info.last_event_age_s != null ? info.last_event_age_s + 's ago' : '-';
        html += `<tr style="border-bottom:1px solid #222;">`;
        html += `<td style="padding:6px;color:#4fc3f7;">${name}</td>`;
        html += `<td style="text-align:center;">${info.total_events}</td>`;
        html += `<td style="text-align:center;">${info.messages_sent}</td>`;
        html += `<td style="text-align:center;">${info.messages_received}</td>`;
        html += `<td style="text-align:center;color:#888;">${lastAge}</td>`;
        html += `<td style="color:#aaa;">${topTools}</td>`;
        html += `</tr>`;
      }
      html += '</table></div>';
      el.innerHTML = html;
    });
}

function refreshNudges() {
  fetch('/api/nudges')
    .then(r => r.json())
    .then(data => {
      const el = document.getElementById('messages');
      if (!data.history || !data.history.length) {
        el.innerHTML = '<div class="empty">No nudge activity yet. Rules will evaluate once agents are running.</div>';
        return;
      }
      let html = '<div style="padding:16px;font-family:monospace;font-size:11px;">';
      html += '<h3 style="color:#4fc3f7;margin:0 0 8px;">Nudge Rules</h3>';
      html += '<table style="width:100%;border-collapse:collapse;color:#aaa;margin-bottom:16px;">';
      html += '<tr style="border-bottom:1px solid #333;color:#888;"><th style="text-align:left;padding:4px;">#</th><th style="text-align:left;">Rule</th><th>Prob</th><th>Cooldown</th></tr>';
      (data.rules || []).forEach(r => {
        html += `<tr style="border-bottom:1px solid #222;"><td style="padding:4px;">${r.idx}</td><td>${r.name}</td><td style="text-align:center;">${(r.probability*100).toFixed(0)}%</td><td style="text-align:center;">${r.cooldown_s}s</td></tr>`;
      });
      html += '</table>';
      html += '<h3 style="color:#4fc3f7;margin:0 0 8px;">Recent Activity (newest first)</h3>';
      html += '<table style="width:100%;border-collapse:collapse;color:#ccc;">';
      html += '<tr style="border-bottom:1px solid #333;color:#888;"><th style="text-align:left;padding:4px;">Time</th><th>Agent</th><th>Rule</th><th>Outcome</th><th>Detail</th></tr>';
      data.history.slice().reverse().forEach(h => {
        const t = new Date(h.timestamp * 1000).toLocaleTimeString();
        const color = h.outcome === 'fired' ? '#4caf50' : h.outcome === 'cooldown' ? '#ff9800' : h.outcome === 'probability_skip' ? '#9e9e9e' : '#f44336';
        const detail = (h.detail || '').substring(0, 80);
        html += `<tr style="border-bottom:1px solid #222;"><td style="padding:4px;color:#888;">${t}</td><td style="color:#4fc3f7;">${h.agent}</td><td>${h.rule}</td><td style="color:${color};">${h.outcome}</td><td style="color:#777;font-size:10px;">${detail}</td></tr>`;
      });
      html += '</table></div>';
      el.innerHTML = html;
    });
}

// Budget control
function increaseBudget(agentName) {
  const amount = prompt(`Increase budget for "${agentName}" by how much ($)?`, "10");
  if (!amount) return;
  const val = parseFloat(amount);
  if (isNaN(val) || val <= 0) { alert('Invalid amount'); return; }
  fetch(`/api/agents/${encodeURIComponent(agentName)}/budget`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({amount: val})
  }).then(r => r.json()).then(d => {
    if (d.status === 'ok') alert(`${agentName} budget: $${d.old_budget} → $${d.new_budget}`);
    else alert(d.message || 'Failed');
  });
}

// Swarm controls
function createNew() { if (isRunning) { alert('Cancel the running swarm first.'); return; } wsSend({ action: 'create_new' }); }
function createCheckpoint() {
  fetch('/api/swarm/checkpoint', { method: 'POST' })
    .then(r => r.json())
    .then(d => { if (d.status === 'created') alert('Checkpoint created: ' + d.path); else alert(d.message || 'Failed'); });
}
function fetchCheckpointList() {
  fetch('/api/swarm/checkpoints')
    .then(r => r.json())
    .then(cps => { checkpointList = cps; renderMessages(); });
}
function resumeFromCheckpoint(name) {
  if (confirm('Resume from checkpoint "' + name + '"?')) {
    fetch('/api/swarm/resume_checkpoint', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({checkpoint: name}) })
      .then(r => r.json()).then(d => alert(d.status === 'resumed' ? 'Resumed from ' + name : (d.message || 'Failed')));
  }
}
function listCheckpoints() {
  fetch('/api/swarm/checkpoints')
    .then(r => r.json())
    .then(cps => {
      if (!cps.length) { alert('No checkpoints available.'); return; }
      const choice = prompt('Available checkpoints:\\n' + cps.map((c,i) => (i+1)+'. '+c).join('\\n') + '\\n\\nEnter number to resume:');
      if (!choice) return;
      const idx = parseInt(choice) - 1;
      if (idx >= 0 && idx < cps.length) {
        if (confirm('Resume from checkpoint "' + cps[idx] + '"?')) {
          fetch('/api/swarm/resume_checkpoint', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({checkpoint: cps[idx]}) })
            .then(r => r.json()).then(d => alert(d.status === 'resumed' ? 'Resumed from ' + cps[idx] : d.message));
        }
      }
    });
}
function loadChatHistory(name) { wsSend({ action: 'load_chat', name }); }
function resumeChat(name) { if (confirm(`Resume swarm from chat '${name}'? This will start all agents from their saved sessions.`)) { wsSend({ action: 'resume_chat', name }); switchView('chitchat'); } }
function deleteChat(name) { if (confirm(`Delete chat '${name}'?`)) wsSend({ action: 'delete_chat', name }); }
function unloadSwarm() { if (isRunning) { alert('Cancel the running swarm first.'); return; } specs = []; agents = {}; agentMessages = {}; allMessages = []; selectedAgent = null; wsSend({ action: 'create_new' }); }
function startSwarm() { if (isRunning) { alert('Swarm already running.'); return; } wsSend({ action: 'start' }); }
function pauseAll() { wsSend({ action: 'pause_all' }); }
function resumeAll() { wsSend({ action: 'resume_all' }); }
function cancelAll() { wsSend({ action: 'cancel' }); }
function removeAgent(name) { if (isRunning) { alert('Cannot edit while running.'); return; } wsSend({ action: 'remove_agent', agent: name }); }
function editAgent(name) {
  if (isRunning) { alert('Cannot edit while running.'); return; }
  const spec = specs.find(s => s.name === name);
  if (!spec) return;
  // Populate the add-agent modal with existing values for editing
  document.getElementById('agent-name').value = spec.name;
  document.getElementById('agent-system-prompt').value = spec.system_prompt;
  document.getElementById('agent-prompt').value = spec.prompt;
  document.getElementById('agent-allowed-tools').value = (spec.allowed_tools || []).join(', ');
  document.getElementById('agent-disallowed-tools').value = (spec.disallowed_tools || []).join(', ');
  document.getElementById('agent-max-turns').value = spec.max_turns || '';
  document.getElementById('agent-max-budget').value = spec.max_budget_usd || '';
  document.getElementById('agent-timeout').value = spec.timeout_seconds || '';
  document.getElementById('agent-is-super').checked = spec.is_super_agent || false;
  // Remove the old one, then show modal (re-adding will create updated version)
  wsSend({ action: 'remove_agent', agent: name });
  showAddAgent();
}

// Agent controls
function pauseAgent() { if (selectedAgent) wsSend({ action: 'pause', agent: selectedAgent }); }
function resumeAgent() { if (selectedAgent) wsSend({ action: 'resume', agent: selectedAgent }); }
function cancelAgent() { if (selectedAgent) wsSend({ action: 'cancel_agent', agent: selectedAgent }); }
function sendMessage() {
  const input = document.getElementById('msg-input');
  const targetSelect = document.getElementById('msg-target');
  const target = targetSelect.value;
  const msg = input.value.trim();
  if (!msg) return;
  if (!target) { alert('Select a target agent to send the message to.'); return; }

  if (target === '__all__') {
    Object.keys(agents).forEach(name => {
      wsSend({ action: 'send_message', agent: name, message: msg });
      if (agentMessages[name]) agentMessages[name].push({ text: `[user]: ${msg}`, type: 'injected', agent: 'user', ts: Date.now() });
    });
    allMessages.push({ text: `[user -> ALL]: ${msg}`, type: 'injected', agent: 'user', ts: Date.now() });
  } else {
    wsSend({ action: 'send_message', agent: target, message: msg });
    allMessages.push({ text: `[user -> ${target}]: ${msg}`, type: 'injected', agent: 'user', ts: Date.now() });
    if (agentMessages[target]) agentMessages[target].push({ text: `[user]: ${msg}`, type: 'injected', agent: 'user', ts: Date.now() });
  }
  input.value = '';
  renderMessages();
}

function updateTargetDropdown() {
  const select = document.getElementById('msg-target');
  const currentVal = select.value;
  const names = Object.keys(agents).length > 0 ? Object.keys(agents) : specs.map(s => s.name);
  let html = '<option value="">-- select target --</option>';
  html += '<option value="__all__">All Agents</option>';
  names.forEach(name => { html += `<option value="${name}">${name}</option>`; });
  select.innerHTML = html;
  // Restore selection
  if (currentVal && (names.includes(currentVal) || currentVal === '__all__')) select.value = currentVal;
  else if (selectedAgent && names.includes(selectedAgent)) select.value = selectedAgent;
}

// Add Agent Modal
function showAddAgent() { if (isRunning) { alert('Cannot add agents while running.'); return; } document.getElementById('modal-overlay').classList.add('visible'); document.getElementById('agent-name').focus(); }
function hideModal() { document.getElementById('modal-overlay').classList.remove('visible'); }
function addAgent() {
  const name = document.getElementById('agent-name').value.trim();
  const systemPrompt = document.getElementById('agent-system-prompt').value.trim();
  const prompt = document.getElementById('agent-prompt').value.trim();
  const allowed = document.getElementById('agent-allowed-tools').value.split(',').map(s=>s.trim()).filter(Boolean);
  const disallowed = document.getElementById('agent-disallowed-tools').value.split(',').map(s=>s.trim()).filter(Boolean);
  const maxTurns = parseInt(document.getElementById('agent-max-turns').value) || null;
  const maxBudget = parseFloat(document.getElementById('agent-max-budget').value) || null;
  const timeout = parseFloat(document.getElementById('agent-timeout').value) || null;
  const isSuper = document.getElementById('agent-is-super').checked;
  if (!name || !systemPrompt || !prompt) { alert('Name, system prompt, and task prompt are required.'); return; }
  const spec = { name, system_prompt: systemPrompt, prompt, allowed_tools: allowed, disallowed_tools: disallowed, max_turns: maxTurns, max_budget_usd: maxBudget, timeout_seconds: timeout, is_super_agent: isSuper };
  wsSend({ action: 'add_agent', spec });
  hideModal();
  // Clear form
  ['agent-name','agent-system-prompt','agent-prompt','agent-allowed-tools','agent-disallowed-tools','agent-max-turns','agent-max-budget','agent-timeout'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('agent-is-super').checked = false;
}

// Save/Load Swarm
function showSaveModal() {
  if (specs.length === 0) { alert('No agents to save. Add agents first.'); return; }
  document.getElementById('save-modal').classList.add('visible');
  document.getElementById('save-swarm-name').focus();
}
function hideSaveModal() { document.getElementById('save-modal').classList.remove('visible'); }
function saveSwarm() {
  const name = document.getElementById('save-swarm-name').value.trim();
  if (!name) { alert('Enter a name for this swarm.'); return; }
  wsSend({ action: 'save_swarm', name });
  hideSaveModal();
  document.getElementById('save-swarm-name').value = '';
}

function showLoadModal() {
  renderLoadModal();
  document.getElementById('load-modal').classList.add('visible');
  wsSend({ action: 'list_saved' });
}
function hideLoadModal() { document.getElementById('load-modal').classList.remove('visible'); }
function renderLoadModal() {
  const el = document.getElementById('saved-list-container');
  if (!savedList.length) {
    el.innerHTML = '<div style="color:#666;font-size:12px;padding:10px;">No saved swarms yet.</div>';
    return;
  }
  el.innerHTML = savedList.map(name => `
    <div class="saved-item">
      <span>${escapeHtml(name)}</span>
      <div>
        <button class="btn-load-item" onclick="loadSwarm('${escapeAttr(name)}')">Load</button>
        <button class="btn-delete-item" onclick="deleteSavedSwarm('${escapeAttr(name)}')">Delete</button>
      </div>
    </div>
  `).join('');
}
function loadSwarm(name) { wsSend({ action: 'load_swarm', name }); hideLoadModal(); }
function deleteSavedSwarm(name) {
  if (!confirm(`Delete saved swarm '${name}'?`)) return;
  wsSend({ action: 'delete_swarm', name });
}

connect();
</script>
</body>
</html>
