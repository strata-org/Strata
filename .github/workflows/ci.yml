name: Build

on:
  pull_request:
  merge_group:
  push:
    branches: [main]


jobs:
  strata-benchmarks:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::636399217481:role/github-actions-codebuild-role
          aws-region: us-east-1

      - name: Trigger CodeBuild and wait
        shell: bash
        run: |
          BUILD_ID=$(aws codebuild start-build \
            --project-name strata-benchmarks \
            --query 'build.id' --output text \
            --region us-east-1)
          echo "Build started: $BUILD_ID"

          LOG_KEY="logs/${BUILD_ID}.log"
          echo "[View build log in S3](https://s3.console.aws.amazon.com/s3/object/strata-benchmarks-logs?prefix=${LOG_KEY})" >> $GITHUB_STEP_SUMMARY

          while true; do
            STATUS=$(aws codebuild batch-get-builds \
              --ids "$BUILD_ID" \
              --query 'builds[0].buildStatus' --output text \
              --region us-east-1)
            echo "Current status: [$STATUS]"
            case "$STATUS" in
              SUCCEEDED) break;;
              FAILED|FAULT|TIMED_OUT|STOPPED) echo "Build failed: $STATUS" ; break ;;
              IN_PROGRESS) sleep 30 ;;
              *) echo "Unexpected status: $STATUS"; sleep 10 ; break ;;
            esac
          done

          echo "View build log in S3: https://s3.console.aws.amazon.com/s3/object/strata-benchmarks-logs?prefix=${LOG_KEY}"
          [ "$STATUS" = "SUCCEEDED" ] && exit 0 || exit 1
