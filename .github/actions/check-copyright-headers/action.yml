name: Check copyright headers
description: >
  Verify that all .lean and .py files have the expected copyright header.
  Uses the check_copyright_headers.py script bundled with this repository.

inputs:
  directory:
    description: Root directory to scan (relative to the workspace).
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Check copyright headers
      shell: bash
      run: python3 "${{ github.action_path }}/check_copyright_headers.py" "${{ inputs.directory }}"
