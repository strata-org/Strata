name: Lint whitespace
description: >
  Check .lean files for trailing whitespace and missing final newlines.
  Uses the lintWhitespace.sh script bundled with this repository.

inputs:
  directory:
    description: Directory to scan for .lean files (relative to the workspace).
    required: false
    default: "Strata"

runs:
  using: composite
  steps:
    - name: Check for trailing whitespace
      shell: bash
      run: "${{ github.action_path }}/lintWhitespace.sh" "${{ inputs.directory }}"
