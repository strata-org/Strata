name: Downstream check gate
description: >
  Shared trigger gate for downstream-check workflows. Decides whether a
  downstream check should run for the current event and resolves the PR head
  SHA to build against. Two trigger paths funnel through here:
    - pull_request (ready_for_review/synchronize): runs for non-draft PRs,
      using the PR head SHA from the payload.
    - issue_comment: runs when a repo collaborator (OWNER/MEMBER/COLLABORATOR)
      comments `!downstream-check` on a PR. The author gate is the security
      boundary, since issue_comment runs from the base branch with token
      access. The head SHA is resolved via the API, not trusted from the
      comment text.
  Outputs `run` ("true"/"false") and `head_sha". Gate on `run` in the build
  job's `if:`.

outputs:
  run:
    description: '"true" if a downstream check should run for this event.'
    value: ${{ steps.decide.outputs.run }}
  head_sha:
    description: The PR head SHA to build against (empty when run is "false").
    value: ${{ steps.decide.outputs.head_sha }}

runs:
  using: composite
  steps:
    - name: Decide whether to run and resolve head SHA
      id: decide
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        EVENT_NAME: ${{ github.event_name }}
        PR_DRAFT: ${{ github.event.pull_request.draft }}
        PR_SHA: ${{ github.event.pull_request.head.sha }}
        IS_PR: ${{ github.event.issue.pull_request != null }}
        COMMENT_BODY: ${{ github.event.comment.body }}
        COMMENT_ASSOC: ${{ github.event.comment.author_association }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
        REPO: ${{ github.repository }}
      run: |
        set -euo pipefail
        run=false
        head_sha=""

        if [ "$EVENT_NAME" = "pull_request" ]; then
          if [ "$PR_DRAFT" = "false" ]; then
            run=true
            head_sha="$PR_SHA"
          fi
        elif [ "$EVENT_NAME" = "issue_comment" ]; then
          if [ "$IS_PR" = "true" ] \
             && printf '%s' "$COMMENT_BODY" | grep -qE '(^|[[:space:]])!downstream-check([[:space:]]|$)' \
             && { [ "$COMMENT_ASSOC" = "OWNER" ] || [ "$COMMENT_ASSOC" = "MEMBER" ] || [ "$COMMENT_ASSOC" = "COLLABORATOR" ]; }; then
            run=true
            head_sha=$(gh pr view "$ISSUE_NUMBER" --repo "$REPO" --json headRefOid -q .headRefOid)
          fi
        fi

        echo "run=$run" >> "$GITHUB_OUTPUT"
        echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
        echo "Decision: run=$run head_sha=${head_sha:-<none>} (event=$EVENT_NAME)"
